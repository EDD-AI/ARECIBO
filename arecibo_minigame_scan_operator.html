<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>ARECIBO // Signal Hunt // Operateur</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Pixelify+Sans:wght@400;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/terminal-filter.css?v=global-terminal-filter-amber">
<style>
:root {
  --cream:#f5f1d5;
  --orange:#fa6b2e;
  --green:#98f03b;
  --red:#e64b39;
  --bg:#040404;
}
* { box-sizing:border-box; }
html, body {
  margin:0;
  width:100%;
  min-height:100%;
  background:#000;
  color:var(--cream);
  font-family:'Pixelify Sans', monospace;
}
body {
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  overflow:hidden;
  background:
    radial-gradient(circle at center, rgba(77,55,20,.18), transparent 38%),
    #000;
}
.stage {
  position:relative;
  width:min(88vw, calc(92vh * 0.563));
  aspect-ratio:941 / 1672;
}
.console-screen {
  position:absolute;
  left:27.8%;
  top:8.15%;
  width:45.8%;
  height:58.9%;
  border-radius:26px;
  overflow:hidden;
  background:
    radial-gradient(circle at center, rgba(244,241,213,.04), transparent 36%),
    linear-gradient(180deg, rgba(16,16,14,.98), rgba(3,3,2,.98));
  box-shadow:
    inset 0 0 0 1px rgba(244,241,213,.06),
    inset 0 0 20px rgba(0,0,0,.85),
    inset 0 0 74px rgba(0,0,0,.68);
}
.console-screen::before {
  content:'';
  position:absolute;
  inset:0;
  background:
    linear-gradient(180deg, rgba(255,255,255,.03), transparent 14%),
    repeating-linear-gradient(180deg, rgba(244,241,213,.042) 0 1px, transparent 1px 4px);
  opacity:.42;
  pointer-events:none;
}
.console-screen::after {
  content:'';
  position:absolute;
  inset:0;
  background:
    radial-gradient(circle at center, transparent 48%, rgba(0,0,0,.22) 76%, rgba(0,0,0,.66) 100%),
    linear-gradient(90deg, rgba(0,0,0,.24), transparent 12%, transparent 88%, rgba(0,0,0,.26));
  pointer-events:none;
}
.console-copy {
  position:relative;
  z-index:1;
  width:100%;
  height:100%;
  padding:12px 12px 14px;
  display:flex;
  flex-direction:column;
}
.topline {
  display:flex;
  justify-content:space-between;
  align-items:center;
  min-height:18px;
  margin-bottom:10px;
}
.timer {
  margin-left:auto;
  min-width:52px;
  text-align:right;
  color:var(--orange);
  font-size:16px;
  line-height:1;
  text-shadow:0 0 10px rgba(250,107,46,.14);
}
.timer.is-danger {
  color:var(--red);
}
.board-wrap {
  flex:1 1 auto;
  display:flex;
  align-items:center;
  justify-content:center;
  min-height:0;
}
.asteroid-board {
  display:grid;
  gap:4px;
  justify-content:center;
  align-content:center;
  width:fit-content;
  margin:0 auto;
  transform-origin:center center;
}
.digit-tile {
  width:34px;
  height:34px;
  border:1px solid rgba(244,241,213,.15);
  background:#f5f4ed;
  color:#111;
  font:700 20px/1 'Pixelify Sans', monospace;
  cursor:pointer;
  padding:0;
  transition:background .14s ease, border-color .14s ease, color .14s ease, transform .12s ease;
}
.digit-tile:hover,
.digit-tile:focus-visible {
  outline:none;
  transform:translateY(-1px);
  border-color:rgba(250,107,46,.62);
}
.digit-tile.is-selected {
  background:#f6d4bf;
  border-color:rgba(250,107,46,.88);
}
.digit-tile.is-success {
  background:#cfff95;
  border-color:rgba(152,240,59,.94);
}
.digit-tile.is-error {
  background:#ffb4ae;
  border-color:rgba(230,75,57,.92);
  color:#560e0a;
}
.digit-gap {
  width:34px;
  height:34px;
}
.solved-overlay {
  position:absolute;
  inset:0;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:14px;
  background:rgba(0,0,0,.74);
  opacity:0;
  pointer-events:none;
  transition:opacity .22s ease;
}
.solved-overlay.is-open {
  opacity:1;
  pointer-events:auto;
}
.solved-card {
  width:100%;
  border:1px solid rgba(244,241,213,.34);
  background:rgba(2,3,1,.92);
  padding:18px 14px;
  text-align:center;
}
.solved-card.is-loss {
  border-color:rgba(230,75,57,.54);
}
.solved-title {
  color:var(--orange);
  font-size:18px;
  line-height:1.05;
  text-transform:uppercase;
}
.solved-card.is-loss .solved-title {
  color:var(--red);
}
.solved-copy {
  margin-top:10px;
  color:rgba(244,241,213,.78);
  font-size:13px;
  line-height:1.3;
}
.solved-btn {
  margin-top:14px;
  width:100%;
  min-height:38px;
  border:1px solid rgba(244,241,213,.42);
  background:rgba(0,0,0,.78);
  color:var(--cream);
  font:inherit;
  font-size:15px;
  text-transform:uppercase;
  cursor:pointer;
}
.solved-btn:hover,
.solved-btn:focus-visible {
  outline:none;
  border-color:rgba(250,107,46,.88);
  color:#fff7da;
}
.frame {
  position:absolute;
  inset:0;
  background:url('assets/console-aventure-vrtcl.png') center / contain no-repeat;
  pointer-events:none;
}
@media (max-width: 900px) {
  .stage {
    width:min(96vw, calc(96vh * 0.563));
  }
  .console-screen {
    border-radius:21px;
  }
  .digit-tile,
  .digit-gap {
    width:30px;
    height:30px;
  }
  .digit-tile {
    font-size:18px;
  }
}
</style>
</head>
<body>
  <main class="stage" aria-label="Console operateur">
    <section class="console-screen" aria-label="Module numerique">
      <div class="console-copy">
        <div class="topline">
          <div class="timer" id="timer">60</div>
        </div>
        <div class="board-wrap">
          <div class="asteroid-board" id="asteroid-board" aria-live="polite"></div>
        </div>
      </div>

      <div class="solved-overlay" id="solved-overlay" aria-hidden="true">
        <div class="solved-card" id="solved-card">
          <div class="solved-title" id="solved-title">signal valide</div>
          <div class="solved-copy" id="solved-copy">Synchronisation etablie.</div>
          <button class="solved-btn" type="button" id="continue-button">fermer</button>
        </div>
      </div>
    </section>
    <div class="frame" aria-hidden="true"></div>
  </main>

<script>
const params = new URLSearchParams(window.location.search);
const sessionId = (params.get('session') || 'demo-signal').replace(/[^a-z0-9_-]/gi, '').slice(0, 24) || 'demo-signal';
const storageKey = `arecibo:minigame-signal:${sessionId}`;
const stateKey = `arecibo:minigame-signal-state:${sessionId}`;
const nextUrl = params.get('next') || '';
const boardEl = document.getElementById('asteroid-board');
const timerEl = document.getElementById('timer');
const solvedOverlay = document.getElementById('solved-overlay');
const solvedCard = document.getElementById('solved-card');
const solvedTitle = document.getElementById('solved-title');
const solvedCopy = document.getElementById('solved-copy');
const continueButton = document.getElementById('continue-button');
const shapeSets = [
  {
    columns:10,
    rows:[
      { offset: 5, count: 2 },
      { offset: 4, count: 2 },
      { offset: 2, count: 6 },
      { offset: 1, count: 8 },
      { offset: 1, count: 8 },
      { offset: 0, count: 4 },
      { offset: 1, count: 1 },
      { offset: 1, count: 1 }
    ]
  },
  {
    columns:11,
    rows:[
      { offset: 4, count: 3 },
      { offset: 2, count: 7 },
      { offset: 1, count: 9 },
      { offset: 0, count: 10 },
      { offset: 1, count: 8 },
      { offset: 2, count: 6 },
      { offset: 4, count: 3 }
    ]
  },
  {
    columns:12,
    rows:[
      { offset: 5, count: 2 },
      { offset: 3, count: 6 },
      { offset: 1, count: 10 },
      { offset: 0, count: 12 },
      { offset: 1, count: 8 },
      { offset: 3, count: 4 },
      { offset: 4, count: 2 }
    ]
  },
  {
    columns:10,
    rows:[
      { offset: 3, count: 4 },
      { offset: 2, count: 6 },
      { offset: 1, count: 7 },
      { offset: 0, count: 8 },
      { offset: 1, count: 7 },
      { offset: 2, count: 6 },
      { offset: 3, count: 4 }
    ]
  }
];

let stress = 32;
let targetCode = '';
let selectedTiles = [];
let targetTileIds = [];
let solved = false;
let lost = false;
let remainingSeconds = 60;
let timerId = 0;
let currentShape = shapeSets[0];

function randomDigit() {
  return String(Math.floor(Math.random() * 10));
}

function randomCode() {
  const length = Math.random() > 0.55 ? 2 : 3;
  let code = '';
  while (code.length < length) code += randomDigit();
  return code;
}

function sanitizeCode(value) {
  return String(value || '').replace(/[^0-9]/g, '').slice(0, 3);
}

function resolveCode() {
  const queryCode = sanitizeCode(params.get('code'));
  if (queryCode.length >= 2) {
    localStorage.setItem(storageKey, queryCode);
    return queryCode;
  }

  const stored = sanitizeCode(localStorage.getItem(storageKey));
  if (stored.length >= 2) return stored;

  const generated = randomCode();
  localStorage.setItem(storageKey, generated);
  return generated;
}

function setModuleState(state) {
  localStorage.setItem(stateKey, state);
}

function updateTimerUi() {
  timerEl.textContent = `${String(Math.max(0, remainingSeconds)).padStart(2, '0')}s`;
  timerEl.classList.toggle('is-danger', remainingSeconds <= 10);
}

function stopTimer() {
  if (!timerId) return;
  window.clearInterval(timerId);
  timerId = 0;
}

function beginTimer() {
  stopTimer();
  updateTimerUi();
  timerId = window.setInterval(() => {
    if (solved || lost) {
      stopTimer();
      return;
    }
    remainingSeconds -= 1;
    updateTimerUi();
    if (remainingSeconds <= 0) failByTimeout();
  }, 1000);
}

function clearSelectionVisuals() {
  selectedTiles.forEach(tile => tile.classList.remove('is-selected', 'is-error', 'is-success'));
}

function resetSelection() {
  clearSelectionVisuals();
  selectedTiles = [];
}

function markSelection(className) {
  selectedTiles.forEach(tile => tile.classList.remove('is-selected'));
  selectedTiles.forEach(tile => tile.classList.add(className));
}

function openOverlay({ title, copy, loss = false, button = 'fermer' }) {
  solvedTitle.textContent = title;
  solvedCopy.textContent = copy;
  continueButton.textContent = button;
  solvedCard.classList.toggle('is-loss', loss);
  solvedOverlay.classList.add('is-open');
  solvedOverlay.setAttribute('aria-hidden', 'false');
}

function closeModule() {
  if (nextUrl) {
    window.location.href = nextUrl;
    return;
  }
  window.close();
}

function showSolved() {
  stopTimer();
  setModuleState('solved');
  openOverlay({
    title:'signal valide',
    copy:'Synchronisation etablie.',
    loss:false,
    button: nextUrl ? 'retour expedition' : 'fermer'
  });
}

function failByTimeout() {
  if (solved || lost) return;
  lost = true;
  stopTimer();
  setModuleState('failed');
  openOverlay({
    title:'signal perdu',
    copy:'Temps depasse. Le module se coupe.',
    loss:true,
    button: nextUrl ? 'retour expedition' : 'fermer'
  });
}

function evaluateSelection() {
  const selectedCode = selectedTiles.map(tile => tile.dataset.digit).join('');
  const targetMatch = selectedCode === targetCode;
  const exactMatch = selectedTiles.every(tile => targetTileIds.includes(tile.dataset.tileId));

  if (targetMatch && exactMatch) {
    solved = true;
    markSelection('is-success');
    showSolved();
    return;
  }

  markSelection('is-error');
  stress = Math.min(100, stress + 8);
  setTimeout(() => {
    if (!solved && !lost) resetSelection();
  }, 760);
}

function handleTileClick(tile) {
  if (solved || lost) return;
  if (selectedTiles.includes(tile)) return;

  tile.classList.add('is-selected');
  selectedTiles.push(tile);

  if (selectedTiles.length === targetCode.length) evaluateSelection();
}

function buildBoard() {
  boardEl.innerHTML = '';
  selectedTiles = [];
  targetTileIds = [];
  solved = false;
  lost = false;
  currentShape = shapeSets[Math.floor(Math.random() * shapeSets.length)];
  boardEl.style.gridTemplateColumns = `repeat(${currentShape.columns}, 34px)`;

  const eligibleRows = currentShape.rows
    .map((row, index) => ({ ...row, index }))
    .filter(row => row.count >= targetCode.length + 1);
  const chosenRow = eligibleRows[Math.floor(Math.random() * eligibleRows.length)];
  const targetStart = chosenRow.offset + Math.floor(Math.random() * (chosenRow.count - targetCode.length + 1));

  currentShape.rows.forEach((row, rowIndex) => {
    for (let col = 0; col < currentShape.columns; col += 1) {
      const active = col >= row.offset && col < row.offset + row.count;
      if (!active) {
        const gap = document.createElement('div');
        gap.className = 'digit-gap';
        boardEl.appendChild(gap);
        continue;
      }

      const tile = document.createElement('button');
      tile.type = 'button';
      tile.className = 'digit-tile';
      tile.dataset.tileId = `${rowIndex}-${col}`;

      const isTargetRow = rowIndex === chosenRow.index;
      const targetIndex = col - targetStart;
      const isTarget = isTargetRow && targetIndex >= 0 && targetIndex < targetCode.length;

      tile.dataset.digit = isTarget ? targetCode[targetIndex] : randomDigit();
      tile.textContent = tile.dataset.digit;

      if (isTarget) {
        tile.dataset.target = '1';
        targetTileIds.push(tile.dataset.tileId);
      }

      tile.addEventListener('click', () => handleTileClick(tile));
      boardEl.appendChild(tile);
    }
  });
}

targetCode = resolveCode();
setModuleState('armed');
buildBoard();
beginTimer();

continueButton.addEventListener('click', closeModule);

window.addEventListener('storage', event => {
  if (event.key === storageKey) {
    const nextCode = sanitizeCode(event.newValue);
    if (nextCode.length >= 2 && nextCode !== targetCode) {
      targetCode = nextCode;
      remainingSeconds = 60;
      setModuleState('armed');
      solvedOverlay.classList.remove('is-open');
      solvedCard.classList.remove('is-loss');
      buildBoard();
      beginTimer();
    }
  }
});

window.addEventListener('beforeunload', stopTimer);
</script>
</body>
</html>
