<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>ARECIBO - Connexion multijoueurs</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Pixelify+Sans:wght@400;500;700&display=swap');

@font-face {
  font-family: 'Power Grotesk';
  src: url('fonts/PowerGrotesk-Regular.woff2') format('woff2'),
       url('fonts/PowerGrotesk-Regular.woff') format('woff');
  font-weight: 400;
}
@font-face {
  font-family: 'Power Grotesk';
  src: url('fonts/PowerGrotesk-Bold.woff2') format('woff2'),
       url('fonts/PowerGrotesk-Bold.woff') format('woff');
  font-weight: 700 900;
}
@font-face {
  font-family: 'Degular';
  src: url('fonts/Degular-Black.woff2') format('woff2'),
       url('fonts/Degular-Black.woff') format('woff');
  font-weight: 900;
}
@font-face {
  font-family: 'Degular';
  src: url('fonts/Degular-Bold.woff2') format('woff2'),
       url('fonts/Degular-Bold.woff') format('woff');
  font-weight: 700;
}

:root {
  --cream:#F7FFC3;
  --orange:#FA5A1F;
  --bg:#000;
  --f-logo:'Power Grotesk', sans-serif;
  --f-title:'Degular', sans-serif;
  --f-pixel:'Pixelify Sans', monospace;
}

* { box-sizing:border-box; margin:0; padding:0; }

html,
body {
  width:100%;
  height:100%;
  overflow:hidden;
}

body {
  background:#000;
  color:var(--cream);
  font-family:var(--f-pixel);
  cursor:none;
}

body::before,
body::after {
  content:'';
  position:fixed;
  inset:0;
  pointer-events:none;
}
body::before {
  z-index:9500;
  border-radius:clamp(28px, 4.8vw, 84px);
  background:
    radial-gradient(ellipse at center, transparent 58%, rgba(0,0,0,.32) 80%, rgba(0,0,0,.82) 100%),
    repeating-linear-gradient(0deg, rgba(247,255,195,.045) 0 1px, transparent 1px 9px),
    repeating-linear-gradient(90deg, rgba(247,255,195,.035) 0 1px, transparent 1px 9px);
  box-shadow:
    inset 0 0 52px rgba(0,0,0,.92),
    inset 0 0 150px rgba(0,0,0,.66),
    inset 0 0 0 2px rgba(247,255,195,.04);
  opacity:.62;
  filter:blur(.16px);
}
body::after {
  inset:clamp(10px, 1.4vw, 22px);
  z-index:9600;
  border:1px solid rgba(247,255,195,.05);
  border-radius:clamp(24px, 4.2vw, 78px);
  background:
    linear-gradient(115deg, rgba(247,255,195,.04) 0%, transparent 18%, transparent 76%, rgba(250,90,31,.03) 100%),
    radial-gradient(ellipse at 50% 0%, rgba(247,255,195,.045), transparent 36%);
  box-shadow:inset 0 0 92px rgba(0,0,0,.62);
  opacity:.58;
}

.cursor {
  position:fixed;
  width:14px;
  height:14px;
  border:1.5px solid var(--cream);
  pointer-events:none;
  z-index:9999;
  transform:translate(-50%, -50%);
}
.cursor::after {
  content:'';
  position:absolute;
  top:50%;
  left:50%;
  width:3px;
  height:3px;
  background:var(--orange);
  transform:translate(-50%, -50%);
}

.screen {
  position:relative;
  width:100vw;
  height:100vh;
  overflow:hidden;
  background:#000;
  filter:contrast(1.04) saturate(.94);
}

.multi-shell {
  position:absolute;
  left:6.5vw;
  right:6vw;
  top:13.2vh;
  bottom:.25vh;
  min-width:720px;
  min-height:420px;
}

.frame-art {
  position:absolute;
  inset:0;
  width:100%;
  height:100%;
  object-fit:fill;
  pointer-events:none;
  image-rendering:pixelated;
  opacity:.9;
}

.back-btn {
  position:absolute;
  left:.35%;
  top:.85%;
  width:28px;
  height:28px;
  z-index:12;
  border:0;
  background:transparent;
  color:transparent;
  cursor:none;
}
.back-btn:hover {
  box-shadow:0 0 16px rgba(250,90,31,.32);
}

.multi-logo {
  position:absolute;
  top:3.1%;
  right:2.6%;
  width:min(37vw, 510px);
  max-width:36.2%;
  height:auto;
  z-index:5;
  image-rendering:auto;
  filter:drop-shadow(0 0 18px rgba(247,255,195,.09));
}

.session-block {
  position:absolute;
  left:33.15%;
  top:37.25%;
  width:13.9%;
  min-width:190px;
  z-index:5;
}
.session-code-art {
  width:100%;
  display:block;
  image-rendering:pixelated;
}

.validation-button {
  position:absolute;
  left:32.05%;
  top:58.75%;
  width:15.55%;
  min-width:210px;
  z-index:7;
  border:0;
  background:transparent;
  padding:0;
  cursor:none;
}
.validation-button img {
  width:100%;
  display:block;
  image-rendering:pixelated;
}
.validation-button:hover {
  filter:brightness(1.18) drop-shadow(0 0 13px rgba(250,90,31,.36));
}

.connection-card {
  position:absolute;
  left:51.55%;
  top:39.35%;
  width:18.25%;
  min-width:250px;
  z-index:5;
  image-rendering:pixelated;
  filter:drop-shadow(0 0 20px rgba(247,255,195,.05));
}

.multi-noise {
  position:absolute;
  inset:0;
  z-index:2;
  pointer-events:none;
  opacity:.18;
  background:
    repeating-linear-gradient(0deg, transparent 0 7px, rgba(247,255,195,.07) 7px 8px),
    radial-gradient(circle at 68% 47%, rgba(247,255,195,.03), transparent 20%);
  mix-blend-mode:screen;
}

.page-transition {
  position:fixed;
  inset:0;
  background:#000;
  z-index:1000;
  opacity:0;
  pointer-events:none;
  transition:opacity .42s ease;
}
.page-transition.active {
  opacity:1;
  pointer-events:all;
}

#arecibo-settings-tab {
  left:6.5vw !important;
  bottom:4.8vh !important;
  top:auto !important;
}

@media (max-width: 900px) {
  .multi-shell {
    left:4vw;
    right:4vw;
    top:9vh;
    bottom:9vh;
    min-width:0;
  }
  .multi-logo {
    top:8%;
    right:6%;
    width:44vw;
    max-width:none;
  }
  .session-block {
    left:14%;
    top:38%;
    width:36%;
    min-width:0;
  }
  .validation-button {
    left:14%;
    top:59%;
    width:39%;
    min-width:0;
  }
  .connection-card {
    left:55%;
    top:42%;
    width:34%;
    min-width:0;
  }
}
</style>
<link rel="stylesheet" href="assets/terminal-filter.css?v=global-terminal-filter-amber">
<link rel="stylesheet" href="assets/ingame-settings.css?v=ingame-settings-tabs">
</head>
<body>
<div class="cursor" id="cursor"></div>
<div class="page-transition" id="transition"></div>

<main class="screen" aria-label="Connexion multijoueurs ARECIBO">
  <section class="multi-shell">
    <img class="frame-art" src="assets/multiplayer/frame.svg" alt="">
    <button class="back-btn" type="button" onclick="goMenu()" aria-label="Retour au menu">x</button>
    <img class="multi-logo" src="assets/multiplayer/logo-arecibo.svg" alt="ARECIBO">

    <div class="session-block" aria-label="Code de session de jeu a rejoindre JX3T">
      <img class="session-code-art" src="assets/multiplayer/session-code.svg" alt="Code de session JX3T">
    </div>

    <button class="validation-button" type="button" aria-label="Valider le code de session">
      <img src="assets/multiplayer/validation.svg" alt="validation">
    </button>

    <img class="connection-card" src="assets/multiplayer/connection-card.svg" alt="Connexion entre la station et l'ordinateur">
    <div class="multi-noise" aria-hidden="true"></div>
  </section>
</main>

<script src="assets/ingame-settings.js?v=ingame-settings-tabs"></script>
<script>
const cursor = document.getElementById('cursor');
document.addEventListener('mousemove', event => {
  cursor.style.left = event.clientX + 'px';
  cursor.style.top = event.clientY + 'px';
});

function goMenu() {
  const transition = document.getElementById('transition');
  transition.classList.add('active');
  setTimeout(() => {
    window.location.href = 'arecibo_menu.html?v=multiplayer-connection';
  }, 420);
}
</script>
</body>
</html>
