<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>ARECIBO</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Pixelify+Sans:wght@400;700&display=swap');

* { box-sizing:border-box; margin:0; padding:0; }

html, body {
  width:100vw; height:100vh;
  background:#060704;
  overflow:hidden;
  font-family:'Pixelify Sans', monospace;
  color:#F7FFC3;
}

body::after {
  content:'';
  position:fixed; inset:0;
  background:
    repeating-linear-gradient(0deg,transparent,transparent 3px,rgba(0,0,0,.12) 3px,rgba(0,0,0,.12) 4px),
    repeating-linear-gradient(90deg,rgba(247,255,195,.018) 0 1px,transparent 1px 7px);
  pointer-events:none;
  z-index:100;
  mix-blend-mode:soft-light;
  opacity:.72;
}

/* Vignette */
body::before {
  content:'';
  position:fixed; inset:0;
  background:
    radial-gradient(ellipse at center, transparent 48%, rgba(0,0,0,.32) 76%, rgba(0,0,0,.72) 100%),
    linear-gradient(180deg,rgba(247,255,195,.035),transparent 26%,transparent 74%,rgba(0,0,0,.26));
  pointer-events:none;
  z-index:99;
}

.intro-shell {
  position:fixed;
  left:50%;
  top:50%;
  width:max(100vw, 177.7778vh);
  height:max(100vh, 56.25vw);
  transform:translate(-50%, -50%);
  background:url('assets/intro-console-frame.png') center / cover no-repeat;
  z-index:1;
}

.boot-sequence {
  position:absolute;
  inset:0;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:clamp(26px, 3vw, 54px) clamp(34px, 4.4vw, 78px);
  background:rgba(0,0,0,.12);
  opacity:0;
  pointer-events:none;
  z-index:7;
  transition:opacity .42s ease;
}
.boot-sequence.visible { opacity:1; }

.scene.boot-hidden {
  opacity:0;
}

.boot-panel {
  position:relative;
  width:min(86%, 860px);
  min-height:56%;
  border:1px solid rgba(247,255,195,.9);
  color:#F7FFC3;
  background:rgba(0,0,0,.18);
  box-shadow:
    inset 0 0 28px rgba(247,255,195,.055),
    0 0 14px rgba(247,255,195,.08),
    0 0 12px rgba(0,0,0,.48);
  padding:clamp(26px, 3vw, 46px) clamp(42px, 5vw, 72px);
}

.boot-close {
  position:absolute;
  top:10px;
  left:10px;
  width:20px;
  aspect-ratio:1;
  border:1px solid rgba(247,255,195,.85);
}
.boot-close::before,
.boot-close::after {
  content:'';
  position:absolute;
  left:3px;
  right:3px;
  top:50%;
  height:1px;
  background:rgba(247,255,195,.82);
}
.boot-close::before { transform:rotate(45deg); }
.boot-close::after { transform:rotate(-45deg); }

.boot-title {
  margin-bottom:clamp(18px, 2.2vw, 34px);
  font-size:clamp(12px, 1.08vw, 18px);
  line-height:1.2;
  letter-spacing:.08em;
  text-align:center;
  color:#F7FFC3;
  white-space:nowrap;
}

.boot-log {
  min-height:13.4em;
  font-size:clamp(12px, 1.05vw, 19px);
  line-height:1.28;
  letter-spacing:.055em;
}

.boot-line {
  min-height:1.28em;
  color:rgba(247,255,195,.96);
  text-shadow:0 0 8px rgba(247,255,195,.18);
  white-space:pre-wrap;
}
.boot-line.command,
.boot-line.status { color:#F7FFC3; }
.boot-line.dim { color:rgba(247,255,195,.46); }
.boot-line.error { color:#B92F24; text-shadow:0 0 8px rgba(185,47,36,.18); }
.boot-line.orange { color:#FA5A1F; text-shadow:0 0 10px rgba(250,90,31,.2); }

.boot-cursor::after {
  content:'';
  display:inline-block;
  width:.54em;
  height:.92em;
  margin-left:.12em;
  background:#FA5A1F;
  vertical-align:-.08em;
  animation:blink .75s step-end infinite;
}

.boot-footer {
  position:absolute;
  left:clamp(28px, 4vw, 56px);
  right:clamp(28px, 4vw, 56px);
  bottom:clamp(18px, 2.3vw, 34px);
  border-top:1px solid rgba(247,255,195,.74);
  padding-top:clamp(8px, 1.1vw, 16px);
  text-align:center;
  color:rgba(247,255,195,.9);
  font-size:clamp(14px, 1.55vw, 28px);
  line-height:1;
  letter-spacing:.075em;
}

.panel-lights {
  position:absolute;
  inset:0;
  pointer-events:none;
  z-index:3;
}

.panel-light {
  position:absolute;
  left:var(--x);
  top:var(--y);
  width:clamp(6px, .5vw, 10px);
  aspect-ratio:1;
  border-radius:50%;
  transform:translate(-50%, -50%);
  background:radial-gradient(circle, rgba(247,255,195,.98) 0 28%, rgba(247,255,195,.42) 58%, transparent 82%);
  box-shadow:0 0 8px rgba(247,255,195,.52), 0 0 18px rgba(247,255,195,.16);
  opacity:0;
  animation:panelLightBlink var(--dur, 3.2s) ease-in-out infinite;
  animation-delay:var(--delay, 0s);
}

.panel-light::after {
  content:'';
  position:absolute;
  inset:-7px;
  border:1px solid rgba(247,255,195,.16);
  border-radius:50%;
  opacity:0;
  transform:scale(.45);
  display:none;
  animation:panelLightRing var(--dur, 3.2s) ease-out infinite;
  animation-delay:var(--delay, 0s);
}

.screen-area {
  position:absolute;
  left:23.4%;
  top:19.4%;
  width:53.2%;
  height:61.2%;
  overflow:hidden;
  border-radius:4.6% / 7.6%;
  background:#010101;
  box-shadow:
    inset 0 0 46px rgba(0,0,0,.98),
    inset 0 0 120px rgba(0,0,0,.82),
    0 0 16px rgba(0,0,0,.6);
}

.screen-area::before {
  content:'';
  position:absolute;
  inset:0;
  background:
    radial-gradient(ellipse at center,transparent 58%,rgba(0,0,0,.48) 100%),
    repeating-linear-gradient(0deg,rgba(247,255,195,.045) 0 1px,transparent 1px 8px);
  filter:blur(.18px);
  pointer-events:none;
  z-index:5;
  opacity:.56;
}

.screen-area::after {
  content:'';
  position:absolute;
  inset:0;
  background:linear-gradient(115deg,rgba(247,255,195,.035),transparent 24%,transparent 72%,rgba(250,90,31,.028));
  pointer-events:none;
  z-index:6;
}

.scene {
  position:absolute; inset:0;
  display:flex;
  align-items:center;
  justify-content:flex-start;
  padding:clamp(28px, 3.3vw, 58px) clamp(34px, 4.1vw, 74px);
  z-index:2;
}

.terminal {
  width:100%;
  max-width:none;
}

/* Ligne de texte principale — grand et lisible */
#story-text {
  font-size:clamp(18px, 1.58vw, 30px);
  line-height:1.62;
  letter-spacing:.03em;
  color:#F7FFC3;
  min-height:8em;
  white-space:pre-wrap;
  text-shadow:0 0 8px rgba(247,255,195,.1), 0 0 18px rgba(250,90,31,.06);
}

/* Le prompt >_ */
.prompt {
  color:#FA5A1F;
  font-size:clamp(18px, 1.58vw, 30px);
  letter-spacing:.03em;
  margin-bottom:1em;
  opacity:0;
  transition:opacity .3s;
  text-shadow:0 0 12px rgba(250,90,31,.2);
}
.prompt.show { opacity:1; }

/* Curseur clignotant */
.cursor-char {
  display:inline-block;
  width:.55em; height:1.1em;
  background:#FA5A1F;
  vertical-align:text-bottom;
  animation:blink .75s step-end infinite;
  margin-left:2px;
}
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }

@keyframes panelLightBlink {
  0%, 100% {
    opacity:0;
    filter:brightness(1);
    transform:translate(-50%, -50%) scale(1);
  }
  42% {
    opacity:.94;
    filter:brightness(1.45);
    transform:translate(-50%, -50%) scale(1.08);
  }
  58% {
    opacity:.24;
    filter:brightness(1.1);
    transform:translate(-50%, -50%) scale(1.02);
  }
}

@keyframes panelLightRing {
  0%, 44% {
    opacity:0;
    transform:scale(.45);
  }
  52% {
    opacity:.34;
  }
  100% {
    opacity:0;
    transform:scale(1.85);
  }
}

/* Bouton passer */
#skip {
  position:absolute;
  bottom:6.8%;
  right:5.8%;
  font-family:'Pixelify Sans', monospace;
  font-size:11px; letter-spacing:.12em;
  color:rgba(247,255,195,.2);
  background:none; border:none;
  cursor:pointer;
  transition:color .2s;
  z-index:20;
}
#skip:hover { color:rgba(247,255,195,.5); }
#skip.hidden {
  opacity:0;
  pointer-events:none;
}

/* Fondu */
#fade {
  position:fixed; inset:0;
  background:#000;
  opacity:0; pointer-events:none;
  transition:opacity .8s ease;
  z-index:300;
}
#fade.active { opacity:1; pointer-events:all; }

@media (prefers-reduced-motion: reduce) {
  .panel-light,
  .panel-light::after { animation:none; }
}
</style>
</head>
<body>

<div class="intro-shell">
  <div class="panel-lights" id="panel-lights" aria-hidden="true"></div>
  <div class="screen-area">
    <div class="scene">
  <div class="terminal">
    <div class="prompt" id="prompt">&gt;_</div>
    <div id="story-text"><span class="cursor-char" id="cursor"></span></div>
  </div>
</div>

<div id="boot-sequence" class="boot-sequence" aria-hidden="true">
  <div class="boot-panel">
    <div class="boot-close" aria-hidden="true"></div>
    <div class="boot-title">MOTOMOTO SYSTEMS / BOOT SEQUENCE v0.1.7</div>
    <div id="boot-log" class="boot-log"></div>
  </div>
  <div class="boot-footer">MOTOMOTO // TRANSMISSION LOG // ENTRY 001</div>
</div>

<button id="skip" onclick="skipIntro()">PASSER ›</button>
  </div>
</div>
<div id="fade"></div>

<script>
const NEXT = 'arecibo_game.html?v=solo-prototype';
const BOOT_TYPE_SPEED = 10;
const BOOT_LINE_PAUSE = 82;
const HELLO_TYPE_SPEED = 48;
const HELLO_HOLD = 1500;
const FINAL_FADE_HOLD = 900;

const PANEL_LIGHTS = [
  [3.80, 4.62], [11.30, 4.63], [88.73, 4.64], [93.22, 4.68], [98.34, 4.87],
  [13.79, 17.85], [7.18, 17.90], [0.43, 17.96], [86.54, 18.22],
  [3.86, 22.94], [11.00, 22.95], [91.20, 23.15], [98.51, 23.31],
  [13.49, 27.92], [7.14, 27.92], [0.36, 28.01], [86.54, 28.20], [94.91, 28.25],
  [3.83, 33.09], [91.30, 33.40], [98.54, 33.40],
  [7.17, 38.04], [13.40, 38.21], [0.32, 38.25], [95.02, 38.41], [86.65, 38.43],
  [10.95, 43.44], [91.37, 43.62],
  [0.31, 56.56], [7.18, 56.59], [13.57, 56.63], [86.66, 56.93], [94.69, 57.40],
  [3.88, 61.85], [10.91, 61.95], [90.78, 62.39], [98.23, 62.68],
  [94.65, 67.03], [86.77, 67.06], [0.29, 67.18], [7.15, 67.26], [13.54, 67.38],
  [98.26, 72.38], [10.91, 72.42], [3.91, 72.61],
  [94.69, 77.78], [86.68, 77.88], [0.31, 77.89], [7.13, 78.07], [13.60, 78.13],
  [92.50, 96.64], [98.06, 96.67], [0.19, 96.72], [6.89, 96.80], [13.38, 96.98]
];

function buildPanelLights() {
  const holder = document.getElementById('panel-lights');
  if (!holder) return;
  const fragment = document.createDocumentFragment();

  PANEL_LIGHTS.forEach(([x, y], index) => {
    const light = document.createElement('span');
    light.className = 'panel-light';
    light.style.setProperty('--x', `${x}%`);
    light.style.setProperty('--y', `${y}%`);
    light.style.setProperty('--delay', `${-((index * .37) % 3.4).toFixed(2)}s`);
    light.style.setProperty('--dur', `${(2.6 + (index % 5) * .34).toFixed(2)}s`);
    fragment.appendChild(light);
  });

  holder.appendChild(fragment);
}

buildPanelLights();

// Le texte complet — paragraphes séparés par double \n
const STORY = [
  `En 1974, des humains ont pointé une antenne vers les étoiles et envoyé un message dans l'obscurité.`,

  `1679 bits. Une carte de l'humanité. Une bouteille jetée dans l'infini.`,

  `Ce qu'ils ne savaient pas, c'est qu'un trou noir se trouvait sur la trajectoire du signal.\n\nLe message d'Arecibo a été aspiré. Enfermé dans la singularité.`,

  `Un trou noir ne détruit pas.\n\nIl retient.`,

  `Compressé dans son champ gravitationnel, le message tourne encore.\nIl émet une fréquence infime, indéchiffrable depuis la Terre.\nIl attend.`,

  `Pour s'en approcher, il a fallu des volontaires.\n\nOu plutôt — des êtres que personne ne regretterait d'envoyer.`,

  `Avant d'envoyer des hommes dans l'espace, on avait envoyé des animaux.\nDes chiens. Des singes. Des chats.\nLaïka. Ham. Félicette.`,

  `Leurs noms sont gravés dans les archives.\nLeurs corps, perdus dans le vide.`,

  `Certains ont survécu.\n\nLe programme MOTOMOTO les a récupérés, soignés, entraînés.\nIls ont appris à piloter. À réparer. À survivre là où aucun humain ne voulait aller.`,

  `Leur mission : approcher le trou noir.\n\nRécupérer ce qui dérive sur leur passage.\nAvancer. Réparer le vaisseau. Capter le message.`,

  `Avant que le trou noir n'aspire tout.\n\nY compris eux.`,
];

const BOOT_LINES = [
  { text: '> INIT HARDWARE...', className: 'command' },
  { text: '[OK] MEMORY BANK A .......... 4096kb' },
  { text: '[OK] MEMORY BANK B .......... 4096kb' },
  { text: '[OK] THERMAL SENSORS ........ NOMINAL' },
  { text: '[OK] LIFE SUPPORT ........... ONLINE' },
  { text: '> LOADING NAVIGATION CORE...', className: 'command' },
  { text: '[OK] STAR CHARTS ............ LOADED' },
  { text: '[OK] PROXIMITY SENSORS ...... ACTIVE' },
  { text: '[!] SECTOR MAP .............. CORRUPTED', className: 'error' },
  { text: '[--] UNKNOWN SIGNAL ......... DETECTED?', className: 'dim' },
  { text: '> ESTABLISHING COMMY LINK...', className: 'command' },
  { text: '[OK] INTERNAL COMMS ......... ONLINE' },
  { text: '[!] EXTERNAL SIGNAL ......... ENCRYPTED', className: 'error' },
  { text: '[--] SOURCE ................. UNKNOWN', className: 'dim' },
  { text: '> RUNNING DIAGNOSTIC...', className: 'command' },
  { text: ': CHECKING SYSTEMS', className: 'status' }
];

let allTimers = [];
function delay(fn, ms) { const t = setTimeout(fn, ms); allTimers.push(t); return t; }

const storyEl  = document.getElementById('story-text');
const cursorEl = document.getElementById('cursor');
const promptEl = document.getElementById('prompt');

let charIndex  = 0;
let paraIndex  = 0;
let fullText   = '';
let running    = true;
let bootStarted = false;

// Vitesse de frappe (ms par caractère)
const SPEED     = 28;
const PARA_PAUSE = 1600; // pause entre paragraphes
const END_HOLD   = 2800; // pause avant fadeout

function typeChar() {
  if (!running) return;

  const para = STORY[paraIndex];

  if (charIndex < para.length) {
    fullText += para[charIndex];
    storyEl.innerHTML = fullText.replace(/\n/g, '<br>') + '<span class="cursor-char"></span>';
    charIndex++;
    delay(typeChar, SPEED);
  } else {
    // Fin du paragraphe courant
    paraIndex++;
    if (paraIndex < STORY.length) {
      // Pause, puis vide l'écran, puis reprend
      delay(() => {
        fullText = '';
        charIndex = 0;
        storyEl.innerHTML = '<span class="cursor-char"></span>';
        delay(typeChar, 300);
      }, PARA_PAUSE);
    } else {
      // Fin de l'histoire
      storyEl.innerHTML = fullText.replace(/\n/g, '<br>') + '<span class="cursor-char"></span>';
      delay(goNext, END_HOLD);
    }
  }
}

function goNext() {
  startBootSequence();
}

function skipIntro() {
  startBootSequence();
}

function startBootSequence() {
  if (bootStarted) return;
  bootStarted = true;
  running = false;
  allTimers.forEach(clearTimeout);
  const skip = document.getElementById('skip');
  const boot = document.getElementById('boot-sequence');
  const scene = document.querySelector('.scene');

  if (skip) skip.classList.add('hidden');
  if (scene) scene.classList.add('boot-hidden');
  if (boot) boot.classList.add('visible');

  runBootLines(0);
}

function appendBootLine(text, className = '', speed = BOOT_TYPE_SPEED) {
  const log = document.getElementById('boot-log');
  if (!log) return null;
  const line = document.createElement('div');
  line.className = `boot-line ${className}`.trim();
  log.appendChild(line);
  typeBootText(line, text, speed, () => {
    line.classList.remove('boot-cursor');
  });
  return line;
}

function typeBootText(line, text, speed, done) {
  let index = 0;
  line.textContent = '';
  line.classList.add('boot-cursor');

  function tick() {
    line.textContent = text.slice(0, index);
    index++;

    if (index <= text.length) {
      delay(tick, speed);
    } else {
      if (done) done();
    }
  }

  tick();
}

function runBootLines(index) {
  if (index >= BOOT_LINES.length) {
    delay(showHelloWorld, 700);
    return;
  }

  const entry = BOOT_LINES[index];
  const line = appendBootLine(entry.text, entry.className);
  const writeTime = Math.max(260, entry.text.length * BOOT_TYPE_SPEED);

  delay(() => {
    if (line) line.classList.remove('boot-cursor');
    runBootLines(index + 1);
  }, writeTime + BOOT_LINE_PAUSE);
}

function showHelloWorld() {
  const log = document.getElementById('boot-log');
  if (!log) return;

  log.innerHTML = '';
  appendBootLine(': CHECKING SYSTEMS', 'status');

  delay(() => appendBootLine('> loading session...', 'dim'), 520);

  delay(() => {
    const hello = appendBootLine('>hello world.', 'orange', HELLO_TYPE_SPEED);
    delay(() => {
      if (hello) hello.classList.add('boot-cursor');
      finishBootSequence();
    }, 900);
  }, 1280);
}

function finishBootSequence() {
  const fade = document.getElementById('fade');
  delay(() => {
    if (fade) fade.classList.add('active');
  }, HELLO_HOLD);

  delay(() => {
    window.location.href = NEXT;
  }, HELLO_HOLD + FINAL_FADE_HOLD);
}

// Démarrage
delay(() => {
  promptEl.classList.add('show');
  delay(typeChar, 600);
}, 800);
</script>
</body>
</html>
