function buildPanelLights() {
  const holder = document.getElementById('panel-lights');
  if (!holder) return;
  const fragment = document.createDocumentFragment();

  PANEL_LIGHTS.forEach(([x, y], index) => {
    const light = document.createElement('span');
    light.className = 'panel-light';
    light.style.setProperty('--x', `${x}%`);
    light.style.setProperty('--y', `${y}%`);
    light.style.setProperty('--delay', `${-((index * .29) % 2.7).toFixed(2)}s`);
    light.style.setProperty('--dur', `${(1.8 + (index % 5) * .24).toFixed(2)}s`);
    fragment.appendChild(light);
  });

  holder.appendChild(fragment);
}

buildPanelLights();

function startHullFly() {
  const fly = document.getElementById('hull-fly');
  if (!fly || window.matchMedia('(prefers-reduced-motion: reduce)').matches) return;

  const walkZones = [
    { x:[4.6, 8.8], y:[14.8, 84.6], rotDown:[168, 194], rotUp:[-2, 24] },
    { x:[91.2, 96.4], y:[15.6, 83.2], rotDown:[-14, 12], rotUp:[180, 206] }
  ];

  const edgeCrawls = [
    { x:[16.5, 84.5], y:[4.8, 7.3], rot:[78, 104] },
    { x:[15.2, 84.8], y:[92.6, 95.6], rot:[78, 102] }
  ];

  function randomBetween(min, max) {
    return min + Math.random() * (max - min);
  }

  function place(point, rotation, scale = 1) {
    fly.style.left = `${point[0]}%`;
    fly.style.top = `${point[1]}%`;
    fly.style.transform = `translate(-50%, -50%) rotate(${rotation}deg) scale(${scale})`;
  }

  function schedule(delayTime) {
    setTimeout(() => {
      if (Math.random() < .82) runSideWalk();
      else runEdgeCrawl();
    }, delayTime);
  }

  function walkStep(zone, direction, remaining) {
    const yStep = randomBetween(2.4, 4.8) * direction;
    const currentY = parseFloat(fly.dataset.y || `${randomBetween(zone.y[0], zone.y[1])}`);
    let nextY = currentY + yStep;

    if (nextY < zone.y[0] || nextY > zone.y[1]) {
      direction *= -1;
      nextY = currentY + Math.abs(yStep) * direction;
    }

    const nextX = randomBetween(zone.x[0], zone.x[1]);
    const rotRange = direction > 0 ? zone.rotDown : zone.rotUp;
    fly.dataset.y = String(nextY);
    place([nextX, nextY], randomBetween(rotRange[0], rotRange[1]), randomBetween(1.02, 1.24));

    if (remaining > 0) {
      setTimeout(() => walkStep(zone, direction, remaining - 1), randomBetween(650, 1150));
    } else {
      setTimeout(() => {
        fly.classList.remove('visible');
        schedule(randomBetween(2400, 6200));
      }, randomBetween(500, 1100));
    }
  }

  function runSideWalk() {
    const zone = walkZones[Math.floor(Math.random() * walkZones.length)];
    const direction = Math.random() > .5 ? 1 : -1;
    const startY = direction > 0 ? randomBetween(zone.y[0], zone.y[0] + 18) : randomBetween(zone.y[1] - 18, zone.y[1]);
    const startX = randomBetween(zone.x[0], zone.x[1]);
    const rotRange = direction > 0 ? zone.rotDown : zone.rotUp;

    fly.classList.add('resting', 'visible');
    fly.dataset.y = String(startY);
    place([startX, startY], randomBetween(rotRange[0], rotRange[1]), randomBetween(1.05, 1.28));
    setTimeout(() => walkStep(zone, direction, 9 + Math.floor(Math.random() * 8)), randomBetween(600, 1200));
  }

  function runEdgeCrawl() {
    const edge = edgeCrawls[Math.floor(Math.random() * edgeCrawls.length)];
    let direction = Math.random() > .5 ? 1 : -1;
    let x = direction > 0 ? randomBetween(edge.x[0], edge.x[0] + 12) : randomBetween(edge.x[1] - 12, edge.x[1]);
    const y = randomBetween(edge.y[0], edge.y[1]);
    let steps = 5 + Math.floor(Math.random() * 6);

    fly.classList.add('resting', 'visible');

    function step() {
      x += randomBetween(2.8, 5.2) * direction;
      if (x < edge.x[0] || x > edge.x[1]) direction *= -1;
      const point = [
        Math.max(edge.x[0], Math.min(edge.x[1], x)),
        y + randomBetween(-.45, .45)
      ];
      const rotation = randomBetween(edge.rot[0], edge.rot[1]) + (direction < 0 ? 180 : 0);
      place(point, rotation, randomBetween(1, 1.2));

      if (steps-- > 0) {
        setTimeout(step, randomBetween(720, 1260));
      } else {
        fly.classList.remove('visible');
        schedule(randomBetween(2600, 6800));
      }
    }

    step();
  }

  schedule(1200 + Math.random() * 2400);
}

startHullFly();

function startDustFall() {
  const canvas = document.getElementById('dust-canvas');
  if (!canvas || window.matchMedia('(prefers-reduced-motion: reduce)').matches) return;

  const ctx = canvas.getContext('2d');
  const particles = [];
  const COUNT = 34;
  let width = 0;
  let height = 0;
  let dpr = 1;

  function resizeDust() {
    const rect = canvas.getBoundingClientRect();
    dpr = Math.min(window.devicePixelRatio || 1, 2);
    width = Math.max(1, Math.round(rect.width));
    height = Math.max(1, Math.round(rect.height));
    canvas.width = Math.round(width * dpr);
    canvas.height = Math.round(height * dpr);
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  }

  function resetDust(p, fromTop = true) {
    p.x = Math.random() * width;
    p.y = fromTop ? -Math.random() * height : Math.random() * height;
    p.size = Math.random() > .72 ? 2 : 1;
    p.speed = .12 + Math.random() * .28;
    p.drift = (Math.random() - .5) * .08;
    p.alpha = .08 + Math.random() * .14;
    p.phase = Math.random() * Math.PI * 2;
  }

  function isOnReadableScreen(p) {
    return p.x > width * .234 && p.x < width * .766 && p.y > height * .194 && p.y < height * .806;
  }

  function drawDust() {
    ctx.clearRect(0, 0, width, height);
    particles.forEach(p => {
      p.phase += .018;
      p.x += p.drift + Math.sin(p.phase) * .035;
      p.y += p.speed;

      if (p.y > height + 8 || p.x < -8 || p.x > width + 8) resetDust(p);

      if (!isOnReadableScreen(p)) {
        ctx.fillStyle = `rgba(247,255,195,${p.alpha.toFixed(3)})`;
        ctx.fillRect(Math.round(p.x), Math.round(p.y), p.size, p.size);
      }
    });
    requestAnimationFrame(drawDust);
  }

  resizeDust();
  window.addEventListener('resize', resizeDust);
  for (let i = 0; i < COUNT; i++) {
    const p = {};
    resetDust(p, false);
    particles.push(p);
  }
  drawDust();
}

startDustFall();

  `Ce qu'ils ne savaient pas, c'est qu'un trou noir se trouvait sur la trajectoire du signal.\n\nLe message d'Arecibo a Ã©tÃ© aspirÃ©. EnfermÃ© dans la singularitÃ©.\n\nUn trou noir ne dÃ©truit pas. Il retient.`,

  `Avant d'envoyer des hommes dans l'espace, on avait envoyÃ© des animaux.\nDes chiens. Des singes. Des chats.\nLaÃ¯ka. Ham. FÃ©licette.\n\nLeurs noms sont gravÃ©s dans les archives.\nLeurs corps, perdus dans le vide.`,

  `Certains ont survÃ©cu.\n\nLe programme MOTOMOTO les a rÃ©cupÃ©rÃ©s, soignÃ©s, entraÃ®nÃ©s.\nIls ont appris Ã  piloter. Ã€ rÃ©parer. Ã€ survivre lÃ  oÃ¹ aucun humain ne voulait aller.`,

  `Leur mission : approcher le trou noir.\n\nRÃ©cupÃ©rer ce qui dÃ©rive sur leur passage.\nAvancer. RÃ©parer le vaisseau. Capter le message.\n\nAvant que le trou noir n'aspire tout.\nY compris eux.`,
];

const BOOT_LINES = [
  { text: '> INIT HARDWARE...', className: 'command' },
  { text: '[OK] MEMORY BANK A .......... 4096kb' },
  { text: '[OK] MEMORY BANK B .......... 4096kb' },
  { text: '[OK] THERMAL SENSORS ........ NOMINAL' },
  { text: '[OK] LIFE SUPPORT ........... ONLINE' },
  { text: '> LOADING NAVIGATION CORE...', className: 'command' },
  { text: '[OK] STAR CHARTS ............ LOADED' },
  { text: '[OK] PROXIMITY SENSORS ...... ACTIVE' },
  { text: '[!] SECTOR MAP .............. CORRUPTED', className: 'error' },
  { text: '[--] UNKNOWN SIGNAL ......... DETECTED?', className: 'dim' },
  { text: '> ESTABLISHING COMMY LINK...', className: 'command' },
  { text: '[OK] INTERNAL COMMS ......... ONLINE' },
  { text: '[!] EXTERNAL SIGNAL ......... ENCRYPTED', className: 'error' },
  { text: '[--] SOURCE ................. UNKNOWN', className: 'dim' },
  { text: '> RUNNING DIAGNOSTIC...', className: 'command' },
  { text: ': CHECKING SYSTEMS', className: 'status' }
];

function addPreloadTarget(targets, value, baseUrl = location.href) {
  if (!value || /^(data:|blob:|mailto:|tel:|#)/i.test(value)) return;
  try {
    const url = new URL(value, baseUrl);
    if (url.origin === window.location.origin) targets.add(url.href);
  } catch (error) {}
}

function collectCssUrls(cssText, baseUrl, targets) {
  if (!cssText) return;
  const urlPattern = /url\(\s*(['"]?)(.*?)\1\s*\)/g;
  let match;
  while ((match = urlPattern.exec(cssText)) !== null) {
    addPreloadTarget(targets, match[2], baseUrl);
  }
}

function preloadFetch(url) {
  return fetch(url, { cache: 'force-cache', credentials: 'same-origin' });
}

function readPreloadPercent() {
  if (PRELOAD_STATUS.ready) return 100;
  const total = Math.max(1, PRELOAD_STATUS.total);
  return Math.max(0, Math.min(99, Math.round((PRELOAD_STATUS.loaded / total) * 100)));
}

function preloadFutureScene() {
  if (preloadPromise) return preloadPromise;

  preloadPromise = (async () => {
    const pageUrl = new URL(NEXT, location.href);
    const targets = new Set();

    PRELOAD_STATUS.loaded = 0;
    PRELOAD_STATUS.total = 1;
    PRELOAD_STATUS.ready = false;
    PRELOAD_STATUS.failed = false;

    const response = await preloadFetch(pageUrl.href);
    if (!response.ok) throw new Error(`Preload failed: ${response.status}`);
    const html = await response.text();
    PRELOAD_STATUS.loaded = 1;

    const doc = new DOMParser().parseFromString(html, 'text/html');
    doc.querySelectorAll('link[href], script[src], img[src], source[src], audio[src], video[src]').forEach(node => {
      addPreloadTarget(targets, node.getAttribute('href') || node.getAttribute('src'), pageUrl.href);
    });
    doc.querySelectorAll('style').forEach(node => collectCssUrls(node.textContent, pageUrl.href, targets));
    doc.querySelectorAll('[style]').forEach(node => collectCssUrls(node.getAttribute('style'), pageUrl.href, targets));

    targets.delete(pageUrl.href);
    PRELOAD_STATUS.total = Math.max(1, targets.size + 1);

    await Promise.all(Array.from(targets).map(async url => {
      try {
        await preloadFetch(url);
      } catch (error) {
        // A missing decorative asset should not block the session.
      } finally {
        PRELOAD_STATUS.loaded++;
      }
    }));

    PRELOAD_STATUS.ready = true;
    return true;
  })().catch(() => {
    PRELOAD_STATUS.failed = true;
    return false;
  });

  return preloadPromise;
}

function waitForPreload(maxWait = PRELOAD_TIMEOUT) {
  const timeout = new Promise(resolve => delay(() => resolve(PRELOAD_STATUS.ready), maxWait));
  return Promise.race([preloadFutureScene(), timeout]);
}

let allTimers = [];
function delay(fn, ms) { const t = setTimeout(fn, ms); allTimers.push(t); return t; }

const storyEl  = document.getElementById('story-text');
const cursorEl = document.getElementById('cursor');
const promptEl = document.getElementById('prompt');

let charIndex  = 0;
let paraIndex  = 0;
let fullText   = '';
let running    = true;
let bootStarted = false;

// Vitesse de frappe (ms par caractÃ¨re)
const SPEED     = 24;
const PARA_PAUSE = 900; // pause entre paragraphes
const END_HOLD   = 1800; // pause avant fadeout

function typeChar() {
  if (!running) return;

  const para = STORY[paraIndex];

  if (charIndex < para.length) {
    fullText += para[charIndex];
    storyEl.innerHTML = fullText.replace(/\n/g, '<br>') + '<span class="cursor-char"></span>';
    charIndex++;
    delay(typeChar, SPEED);
  } else {
    // Fin du paragraphe courant
    paraIndex++;
    if (paraIndex < STORY.length) {
      // Pause, puis vide l'Ã©cran, puis reprend
      delay(() => {
        fullText = '';
        charIndex = 0;
        storyEl.innerHTML = '<span class="cursor-char"></span>';
        delay(typeChar, 300);
      }, PARA_PAUSE);
    } else {
      // Fin de l'histoire
      storyEl.innerHTML = fullText.replace(/\n/g, '<br>') + '<span class="cursor-char"></span>';
      delay(goNext, END_HOLD);
    }
  }
}

function goNext() {
  startBootSequence();
}

function skipIntro() {
  startBootSequence();
}

function startBootSequence() {
  if (bootStarted) return;
  bootStarted = true;
  running = false;
  allTimers.forEach(clearTimeout);
  const skip = document.getElementById('skip');
  const boot = document.getElementById('boot-sequence');
  const scene = document.querySelector('.scene');

  if (skip) skip.classList.add('hidden');
  if (scene) scene.classList.add('boot-hidden');
  if (boot) boot.classList.add('visible');

  preloadFutureScene();
  runBootLines(0);
}

function appendBootLine(text, className = '', speed = BOOT_TYPE_SPEED) {
  const log = document.getElementById('boot-log');
  if (!log) return null;
  const line = document.createElement('div');
  line.className = `boot-line ${className}`.trim();
  log.appendChild(line);
  typeBootText(line, text, speed, () => {
    line.classList.remove('boot-cursor');
  });
  return line;
}

function typeBootText(line, text, speed, done) {
  let index = 0;
  const token = `${Date.now()}-${Math.random()}`;
  line.dataset.bootTypeToken = token;
  line.textContent = '';
  line.classList.add('boot-cursor');

  function tick() {
    if (line.dataset.bootTypeToken !== token) return;
    line.textContent = text.slice(0, index);
    index++;

    if (index <= text.length) {
      delay(tick, speed);
    } else {
      if (done) done();
    }
  }

  tick();
}

function replaceBootLine(line, text, className = '', speed = BOOT_TYPE_SPEED) {
  if (!line) return;
  line.className = `boot-line ${className}`.trim();
  typeBootText(line, text, speed, () => {
    line.classList.remove('boot-cursor');
  });
}

function runBootLines(index) {
  if (index >= BOOT_LINES.length) {
    delay(runPreloadLine, 500);
    return;
  }

  const entry = BOOT_LINES[index];
  const line = appendBootLine(entry.text, entry.className);
  const writeTime = Math.max(260, entry.text.length * BOOT_TYPE_SPEED);

  delay(() => {
    if (line) line.classList.remove('boot-cursor');
    runBootLines(index + 1);
  }, writeTime + BOOT_LINE_PAUSE);
}

function runPreloadLine() {
  const preloadLine = appendBootLine('> PRELOADING EXTRACTION SCENE...', 'command');
  const writeTime = Math.max(300, '> PRELOADING EXTRACTION SCENE...'.length * BOOT_TYPE_SPEED);

  delay(() => {
    if (preloadLine) preloadLine.classList.remove('boot-cursor');
    const statusLine = appendBootLine('[--] SCENE CACHE ............ 00%', 'dim');
    if (statusLine) {
      statusLine.dataset.bootTypeToken = 'preload-progress';
      statusLine.className = 'boot-line dim boot-cursor';
      statusLine.textContent = `[--] SCENE CACHE ............ ${String(readPreloadPercent()).padStart(2, '0')}%`;
    }

    const progress = setInterval(() => {
      if (!statusLine || PRELOAD_STATUS.ready || PRELOAD_STATUS.failed) return;
      const percent = String(readPreloadPercent()).padStart(2, '0');
      statusLine.className = 'boot-line dim boot-cursor';
      statusLine.textContent = `[--] SCENE CACHE ............ ${percent}%`;
    }, 140);

    waitForPreload(PRELOAD_TIMEOUT).then(ready => {
      clearInterval(progress);
      const complete = ready || PRELOAD_STATUS.ready;
      replaceBootLine(
        statusLine,
        complete ? '[OK] SCENE CACHE ............ READY' : '[--] SCENE CACHE ............ PARTIAL',
        complete ? 'status' : 'dim'
      );
      delay(showHelloWorld, complete ? 820 : 980);
    });
  }, writeTime + BOOT_LINE_PAUSE);
}

function showHelloWorld() {
  const log = document.getElementById('boot-log');
  if (!log) return;

  log.innerHTML = '';
  appendBootLine(': CHECKING SYSTEMS', 'status');

  delay(() => appendBootLine('> loading session...', 'dim'), 520);

  delay(() => {
    const hello = appendBootLine('>hello world.', 'orange', HELLO_TYPE_SPEED);
    delay(() => {
      if (hello) hello.classList.add('boot-cursor');
      finishBootSequence();
    }, 900);
  }, 1280);
}

function finishBootSequence() {
  const fade = document.getElementById('fade');
  delay(() => {
    waitForPreload(1400).then(() => {
      if (fade) fade.classList.add('active');
      delay(() => {
        window.location.href = NEXT;
      }, FINAL_FADE_HOLD);
    });
  }, HELLO_HOLD);
}

// DÃ©marrage
function waitForIntroFrame() {
  const frameUrl = 'assets/intro-console-frame.png';
  const timeout = new Promise(resolve => setTimeout(resolve, 2600));
  const imageReady = new Promise(resolve => {
    const image = new Image();
    image.onload = () => {
      if (typeof image.decode === 'function') {
        image.decode().then(resolve).catch(resolve);
      } else {
        resolve();
      }
    };
    image.onerror = resolve;
    image.src = frameUrl;
  });

  return Promise.race([imageReady, timeout]);
}

function startIntroText() {
  promptEl.classList.add('show');
  delay(typeChar, 600);
}

waitForIntroFrame().then(() => {
  document.body.classList.add('intro-ready');
  delay(startIntroText, 260);
});
