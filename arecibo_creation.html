<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ARECIBO // Profil</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Pixelify+Sans:wght@400;700&display=swap" rel="stylesheet">
<style>
:root {
  --cream:#f7ffc3;
  --cream-dim:rgba(247,255,195,.58);
  --cream-faint:rgba(247,255,195,.18);
  --orange:#fa591f;
  --panel:rgba(0,0,0,.82);
  --line:rgba(247,255,195,.72);
}
* { box-sizing:border-box; }
html, body {
  margin:0;
  min-height:100%;
  background:#000;
  color:var(--cream);
  font-family:'Pixelify Sans', monospace;
}
body {
  min-height:100vh;
  overflow:hidden;
  cursor:none;
  background:
    radial-gradient(circle at 72% 32%, rgba(247,255,195,.035), transparent 34%),
    radial-gradient(circle at 23% 18%, rgba(250,89,31,.05), transparent 28%),
    #000;
}
body::before {
  content:'';
  position:fixed;
  inset:0;
  pointer-events:none;
  background:
    linear-gradient(rgba(247,255,195,.025) 50%, rgba(0,0,0,.08) 50%),
    repeating-linear-gradient(90deg, rgba(247,255,195,.012) 0 1px, transparent 1px 4px);
  background-size:100% 4px, 4px 100%;
  mix-blend-mode:screen;
  opacity:.42;
  z-index:40;
}
body::after {
  content:'';
  position:fixed;
  inset:-6%;
  pointer-events:none;
  background:
    radial-gradient(ellipse at center, transparent 42%, rgba(0,0,0,.42) 72%, rgba(0,0,0,.92) 100%);
  z-index:41;
}
button,
input {
  font-family:inherit;
}
.cursor {
  position:fixed;
  width:14px;
  height:14px;
  border:1.5px solid var(--cream);
  transform:translate(-50%, -50%);
  pointer-events:none;
  z-index:9999;
}
.cursor::after {
  content:'';
  position:absolute;
  left:50%;
  top:50%;
  width:3px;
  height:3px;
  background:var(--orange);
  transform:translate(-50%, -50%);
}
.transition {
  position:fixed;
  inset:0;
  background:#000;
  z-index:100;
  opacity:1;
  transition:opacity .4s ease;
}
.transition.out { opacity:0; pointer-events:none; }
.screen {
  position:relative;
  z-index:2;
  width:100vw;
  height:100vh;
  display:grid;
  grid-template-columns:minmax(430px, 38vw) minmax(330px, 29vw) minmax(260px, 1fr);
  gap:clamp(26px, 3vw, 52px);
  align-items:start;
  padding:clamp(64px, 8vh, 98px) clamp(52px, 6vw, 100px);
}
.back-btn,
.save-btn,
.gender-btn,
.head-option,
.swatch {
  cursor:none;
}
.back-btn {
  position:fixed;
  left:clamp(22px, 3vw, 42px);
  bottom:clamp(18px, 3vh, 34px);
  z-index:50;
  min-height:34px;
  border:1px solid var(--line);
  background:rgba(0,0,0,.68);
  color:var(--cream);
  padding:0 18px;
  font-size:18px;
  letter-spacing:0;
  text-transform:uppercase;
}
.back-btn:hover {
  border-color:var(--orange);
  color:var(--orange);
  box-shadow:0 0 16px rgba(250,89,31,.18);
}
.creation-window {
  border:1px solid var(--line);
  background:rgba(0,0,0,.58);
  box-shadow:inset 0 0 0 1px rgba(247,255,195,.04);
}
.window-header {
  min-height:53px;
  border-bottom:1px solid var(--line);
  display:flex;
  align-items:center;
  padding:0 22px 0 56px;
  position:relative;
  font-size:clamp(22px, 1.75vw, 31px);
  line-height:1;
}
.window-header::before {
  content:'x';
  position:absolute;
  left:8px;
  top:8px;
  width:17px;
  height:17px;
  border:1px solid var(--line);
  color:var(--cream);
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:15px;
  line-height:1;
}
.heads-window {
  height:calc(100vh - clamp(128px, 16vh, 196px));
  min-height:520px;
  display:flex;
  flex-direction:column;
}
.heads-grid {
  flex:1;
  min-height:0;
  display:grid;
  grid-template-columns:repeat(4, minmax(72px, 1fr));
  grid-auto-rows:minmax(84px, 1fr);
  gap:12px;
  overflow:auto;
  padding:24px;
  scrollbar-color:rgba(250,89,31,.55) rgba(247,255,195,.08);
}
.head-option {
  min-height:84px;
  border:1px solid rgba(247,255,195,.34);
  background:rgba(0,0,0,.36);
  display:flex;
  align-items:center;
  justify-content:center;
  transition:transform .14s ease, border-color .14s ease, background .14s ease, box-shadow .14s ease;
}
.head-option:hover {
  border-color:var(--orange);
  background:rgba(250,89,31,.07);
  transform:translateY(-2px);
}
.head-option.is-selected {
  border-color:var(--orange);
  background:rgba(250,89,31,.13);
  box-shadow:0 0 18px rgba(250,89,31,.18), inset 0 0 0 1px rgba(250,89,31,.28);
}
.head-option svg {
  width:72%;
  height:72%;
  display:block;
  image-rendering:pixelated;
}
.colors-window {
  margin-top:52px;
  min-height:295px;
  padding:42px 50px;
  display:flex;
  align-items:center;
  justify-content:center;
}
.color-stack {
  width:min(300px, 100%);
  display:flex;
  flex-direction:column;
  gap:27px;
}
.field-label {
  margin-bottom:10px;
  text-align:center;
  color:var(--cream);
  font-size:19px;
  line-height:1;
}
.swatch-grid {
  display:grid;
  grid-template-columns:repeat(8, 23px);
  gap:9px 8px;
  justify-content:center;
}
.swatch {
  width:23px;
  height:23px;
  border:1px solid rgba(0,0,0,.22);
  border-radius:6px;
  transition:transform .12s ease, border-color .12s ease, box-shadow .12s ease;
}
.swatch:hover {
  transform:translateY(-2px);
}
.swatch.is-selected {
  border-color:var(--cream);
  box-shadow:0 0 0 2px rgba(0,0,0,.8), 0 0 14px rgba(247,255,195,.35);
}
.identity-column {
  min-height:650px;
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:25px;
  padding-top:36px;
}
.session-code {
  align-self:flex-end;
  min-width:150px;
  border:1px solid var(--line);
  padding:10px 14px 12px;
  text-align:center;
  background:rgba(0,0,0,.5);
}
.session-label {
  font-size:17px;
  line-height:1;
  text-transform:uppercase;
}
.session-value {
  margin-top:6px;
  font-family:Arial, sans-serif;
  font-size:44px;
  line-height:.9;
  font-weight:900;
  letter-spacing:-.03em;
}
.profile-preview {
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:12px;
  margin-top:20px;
}
.profile-disk {
  width:50px;
  height:50px;
  color:var(--cream);
  filter:drop-shadow(0 0 8px rgba(247,255,195,.2));
}
.preview-avatar {
  width:132px;
  aspect-ratio:1;
  display:flex;
  align-items:center;
  justify-content:center;
}
.preview-avatar svg {
  width:100%;
  height:100%;
  display:block;
}
.identity-name {
  min-height:24px;
  color:var(--orange);
  font-size:22px;
  line-height:1;
  text-transform:uppercase;
}
.identity-form {
  width:min(300px, 100%);
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:18px;
}
.identity-prompt {
  color:var(--cream);
  font-size:19px;
}
.input-shell {
  position:relative;
  width:260px;
  height:54px;
  border:1px solid var(--line);
  border-radius:999px;
  display:flex;
  align-items:center;
  background:rgba(0,0,0,.68);
}
.input-shell::before {
  content:'>-';
  padding-left:28px;
  color:var(--cream);
  font-size:30px;
  line-height:1;
}
.name-input {
  flex:1;
  min-width:0;
  height:100%;
  border:0;
  background:transparent;
  color:var(--cream);
  padding:0 24px 0 10px;
  font:inherit;
  font-size:23px;
  text-transform:uppercase;
  outline:none;
}
.name-input::placeholder {
  color:rgba(247,255,195,.22);
}
.gender-row {
  display:flex;
  gap:13px;
  align-items:center;
  min-height:36px;
}
.gender-btn {
  width:33px;
  height:33px;
  border:1px solid rgba(247,255,195,.35);
  background:#000;
  color:var(--cream);
  font-size:28px;
  line-height:.8;
}
.gender-btn.is-selected,
.gender-btn:hover {
  color:var(--orange);
  border-color:var(--orange);
}
.robot-check {
  display:flex;
  align-items:center;
  gap:8px;
  margin-top:8px;
  color:var(--cream);
  font-size:18px;
}
.robot-dot {
  width:17px;
  height:17px;
  border:1px solid var(--line);
  border-radius:50%;
  display:inline-flex;
  align-items:center;
  justify-content:center;
}
.robot-dot::after {
  content:'';
  width:9px;
  height:9px;
  border-radius:50%;
  background:var(--orange);
}
.save-btn {
  min-height:41px;
  border:1px solid var(--orange);
  border-radius:8px;
  background:rgba(0,0,0,.55);
  color:var(--orange);
  padding:0 18px;
  font-size:25px;
  line-height:1;
  letter-spacing:0;
}
.save-btn:hover {
  background:rgba(250,89,31,.1);
  box-shadow:0 0 18px rgba(250,89,31,.24);
}
.hidden-wires {
  position:absolute;
  width:1px;
  height:1px;
  overflow:hidden;
  opacity:0;
  pointer-events:none;
}
.tone-swatch {
  width:1px;
  height:1px;
}
@media (max-width: 1180px) {
  body {
    overflow:auto;
  }
  .screen {
    min-height:100vh;
    height:auto;
    grid-template-columns:1fr;
    gap:22px;
    padding:60px 24px 90px;
  }
  .heads-window {
    height:auto;
    min-height:430px;
  }
  .heads-grid {
    grid-template-columns:repeat(6, minmax(64px, 1fr));
  }
  .colors-window {
    margin-top:0;
  }
  .identity-column {
    min-height:0;
    padding-top:0;
  }
  .session-code {
    align-self:center;
  }
}
</style>
<script src="assets/visual-settings.js?v=pixel-dither-3"></script>
<link rel="stylesheet" href="assets/terminal-filter.css?v=global-pixel-dither-3">
</head>
<body>
<div class="cursor" id="cursor"></div>
<div class="transition" id="transition"></div>

<main class="screen">
  <button class="back-btn" type="button" onclick="goBack()">< menu</button>

  <section class="creation-window heads-window" aria-label="Selection tete animale">
    <div class="window-header">Phase de creation // NIVEAU 1 //</div>
    <div class="heads-grid" id="heads-grid"></div>
  </section>

  <section class="creation-window colors-window" aria-label="Choix des couleurs">
    <div class="color-stack">
      <div>
        <div class="field-label">Couleur principale</div>
        <div class="swatch-grid" id="primary-grid"></div>
      </div>

      <div>
        <div class="field-label">Couleur secondaire</div>
        <div class="swatch-grid" id="secondary-grid"></div>
      </div>
    </div>
  </section>

  <section class="identity-column" aria-label="Validation identite">
    <div class="session-code">
      <div class="session-label">CODE SESSION</div>
      <div class="session-value">JX3T</div>
    </div>

    <div class="profile-preview">
      <svg class="profile-disk" viewBox="0 0 64 64" aria-hidden="true">
        <path fill="none" stroke="currentColor" stroke-width="3" d="M12 8h34l6 6v42H12z"/>
        <path fill="none" stroke="currentColor" stroke-width="3" d="M20 8v18h24V8M20 42h24v14H20z"/>
        <path fill="currentColor" d="M28 13h9v8h-9z"/>
      </svg>
      <div class="preview-avatar" id="preview-avatar"></div>
      <div class="identity-name" id="preview-name">COCO</div>
    </div>

    <div class="identity-form">
      <label class="identity-prompt" for="name-input">Confirme votre identite :</label>
      <div class="input-shell">
        <input class="name-input" id="name-input" type="text" maxlength="10" placeholder="COCO">
      </div>

      <div class="gender-row" aria-label="Marqueur profil">
        <button class="gender-btn" type="button" aria-label="feminin">F</button>
        <button class="gender-btn is-selected" type="button" aria-label="masculin">M</button>
      </div>

      <div class="robot-check">Je ne suis pas un robot : <span class="robot-dot" aria-hidden="true"></span></div>
      <button class="save-btn" type="button" id="save-bottom">[=] id validation</button>
    </div>

    <div class="hidden-wires" aria-hidden="true">
      <button type="button" id="save-top">sauvegarder</button>
      <span id="footer-head">head-01</span>
      <span id="footer-colors">2 couches actives</span>
      <span class="tone-swatch" id="primary-swatch"></span>
      <span class="tone-swatch" id="secondary-swatch"></span>
    </div>
  </section>
</main>

<script src="assets/player-profile.js?v=animal-profile-1"></script>
<script>
const cursor = document.getElementById('cursor');
document.addEventListener('mousemove', event => {
  cursor.style.left = `${event.clientX}px`;
  cursor.style.top = `${event.clientY}px`;
});

const transition = document.getElementById('transition');
const headsGrid = document.getElementById('heads-grid');
const previewAvatar = document.getElementById('preview-avatar');
const previewName = document.getElementById('preview-name');
const primarySwatch = document.getElementById('primary-swatch');
const secondarySwatch = document.getElementById('secondary-swatch');
const primaryGrid = document.getElementById('primary-grid');
const secondaryGrid = document.getElementById('secondary-grid');
const nameInput = document.getElementById('name-input');
const footerHead = document.getElementById('footer-head');
const footerColors = document.getElementById('footer-colors');
const saveButtons = [document.getElementById('save-top'), document.getElementById('save-bottom')];

const profileApi = window.AreciboPlayerProfile;
let currentProfile = profileApi.loadPlayerProfile();

function updateFooter() {
  footerHead.textContent = `head-${String(currentProfile.headId).padStart(2, '0')}`;
  footerColors.textContent = `${currentProfile.primaryColor} // ${currentProfile.secondaryColor}`;
}

async function renderPreview() {
  previewName.textContent = currentProfile.name;
  primarySwatch.style.background = currentProfile.primaryColor;
  secondarySwatch.style.background = currentProfile.secondaryColor;
  updateFooter();
  previewAvatar.innerHTML = await profileApi.renderHeadSvg(currentProfile, {
    className: 'profile-head-svg',
    label: currentProfile.name
  });
}

function buildSwatchGrid(target, palette, key) {
  target.innerHTML = '';
  palette.forEach(color => {
    const button = document.createElement('button');
    button.type = 'button';
    button.className = 'swatch';
    button.style.background = color;
    button.classList.toggle('is-selected', currentProfile[key] === color);
    button.addEventListener('click', () => {
      currentProfile[key] = color;
      buildSwatchGrid(target, palette, key);
      renderHeadsGrid();
      renderPreview();
    });
    target.appendChild(button);
  });
}

async function renderHeadsGrid() {
  headsGrid.innerHTML = '';
  for (let index = 1; index <= profileApi.HEAD_COUNT; index += 1) {
    const option = document.createElement('button');
    option.type = 'button';
    option.className = 'head-option';
    option.classList.toggle('is-selected', currentProfile.headId === index);
    option.innerHTML = await profileApi.renderHeadSvg({
      ...currentProfile,
      headId: index
    }, {
      className: 'head-thumb-svg',
      label: `head ${index}`
    });
    option.addEventListener('click', () => {
      currentProfile.headId = index;
      renderHeadsGrid();
      renderPreview();
    });
    headsGrid.appendChild(option);
  }
}

function saveProfile() {
  currentProfile.name = nameInput.value.trim() || currentProfile.name;
  currentProfile = profileApi.savePlayerProfile(currentProfile);
  try {
    localStorage.setItem('areciboStoryPhase', 'opening-briefing');
    localStorage.removeItem('areciboOpeningMailAutoOpened');
  } catch (err) {}
  renderPreview();
  transition.style.opacity = '1';
  window.setTimeout(() => {
    const next = new URLSearchParams(window.location.search).get('next');
    window.location.href = next === 'intro'
      ? 'arecibo_intro.html?v=global-pixel-dither-3'
      : 'arecibo_menu.html';
  }, 320);
}

function goBack() {
  transition.style.opacity = '1';
  window.setTimeout(() => {
    window.location.href = 'arecibo_menu.html';
  }, 320);
}

nameInput.value = currentProfile.name;
nameInput.addEventListener('input', () => {
  currentProfile.name = nameInput.value.trim().slice(0, 10).toUpperCase() || 'COCO';
  previewName.textContent = currentProfile.name;
});

saveButtons.forEach(button => button.addEventListener('click', saveProfile));
buildSwatchGrid(primaryGrid, profileApi.PRIMARY_PALETTE, 'primaryColor');
buildSwatchGrid(secondaryGrid, profileApi.SECONDARY_PALETTE, 'secondaryColor');
renderHeadsGrid();
renderPreview();

window.addEventListener('DOMContentLoaded', () => {
  window.setTimeout(() => transition.classList.add('out'), 60);
});
</script>
</body>
</html>
