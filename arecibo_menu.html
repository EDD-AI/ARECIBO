<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ARECIBO</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Pixelify+Sans:wght@400;500;700&display=swap');

@font-face {
  font-family: 'Power Grotesk';
  src: url('fonts/PowerGrotesk-Regular.woff2') format('woff2'),
       url('fonts/PowerGrotesk-Regular.woff') format('woff');
  font-weight: 400;
}
@font-face {
  font-family: 'Power Grotesk';
  src: url('fonts/PowerGrotesk-Bold.woff2') format('woff2'),
       url('fonts/PowerGrotesk-Bold.woff') format('woff');
  font-weight: 700 900;
}
@font-face {
  font-family: 'Degular';
  src: url('fonts/Degular-Black.woff2') format('woff2'),
       url('fonts/Degular-Black.woff') format('woff');
  font-weight: 900;
}
@font-face {
  font-family: 'Degular';
  src: url('fonts/Degular-Bold.woff2') format('woff2'),
       url('fonts/Degular-Bold.woff') format('woff');
  font-weight: 700;
}

:root {
  --cream: #F7FFC3;
  --orange: #FA5A1F;
  --bg: #000;
  --f-logo:  'Power Grotesk',  sans-serif;
  --f-title: 'Degular',        sans-serif;
  --f-pixel: 'Pixelify Sans',  monospace;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: #010101;
  width: 100vw; height: 100vh;
  overflow: hidden;
  font-family: var(--f-pixel);
  cursor: none;
}
body::before,
body::after {
  content: '';
  position: fixed;
  inset: 0;
  pointer-events: none;
}
body::before {
  z-index: 9500;
  background: radial-gradient(ellipse at center, transparent 55%, rgba(0,0,0,.5) 100%);
  pointer-events: none;
}
body::after { display: none; }



.cursor {
  position: fixed;
  width: 14px; height: 14px;
  border: 1.5px solid var(--cream);
  pointer-events: none;
  z-index: 9999;
  transform: translate(-50%,-50%);
}
.cursor::after {
  content: '';
  position: absolute;
  top: 50%; left: 50%;
  width: 3px; height: 3px;
  background: var(--orange);
  transform: translate(-50%,-50%);
}

.screen {
  position: relative;
  width: 100vw; height: 100vh;
  overflow: hidden;
  border-radius: clamp(18px, 3.8vw, 72px);
  filter: url(#crt-barrel-warp) contrast(1.06) saturate(.94);
  transform: perspective(900px) translateZ(0) scale(1.026);
  transform-origin: center;
  animation: crtBreath 9s ease-in-out infinite;
}

/* Fond etoile genere en JS */
.starfield {
  position: absolute;
  inset: 0;
  z-index: 0;
}
canvas#starfield-bg {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
  z-index: 0;
}

/* Scanlines */
.screen::after {
  content: '';
  position: absolute;
  inset: 0;
  background: repeating-linear-gradient(0deg,transparent,transparent 3px,rgba(0,0,0,.04) 3px,rgba(0,0,0,.04) 4px);
  pointer-events: none;
  z-index: 20;
}

/* ===== LIGNES ORANGE ===== */
.lines-wrap {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  pointer-events: none;
  z-index: 2;
}
.lines-wrap svg {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
}
.gravity-line {
  will-change: d;
  stroke-linecap: round;
  stroke-linejoin: round;
}

.circles-svg {
  position: absolute;
  top: 0; right: 0;
  width: 40%;
  height: 100%;
  pointer-events: none;
  z-index: 2;
}

.singularity-wrap {
  position: absolute;
  top: 50%;
  right: -15vmin;
  width: clamp(420px, 62vmin, 760px);
  aspect-ratio: 1;
  transform: translateY(-50%);
  pointer-events: none;
  z-index: 4;
  opacity: 1;
}
.singularity-core,
#singularity-waves {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
}
.singularity-core {
  border-radius: 50%;
  border: 1px solid rgba(247,255,195,.28);
  background:
    radial-gradient(circle at 16% 50%, rgba(247,255,195,.32) 0 1.5%, rgba(250,90,31,.3) 7%, transparent 29%),
    radial-gradient(circle at 38% 42%, rgba(247,255,195,.18) 0 1px, transparent 2px 100%),
    radial-gradient(circle at 44% 48%, #020202 0 45%, rgba(0,0,0,.98) 56%, rgba(0,0,0,.52) 66%, transparent 76%),
    radial-gradient(circle at 41% 48%, rgba(250,90,31,.78) 0 1.4%, rgba(250,90,31,.22) 13%, transparent 32%),
    radial-gradient(circle at 50% 50%, rgba(247,255,195,.28) 0 45%, rgba(250,90,31,.34) 57%, transparent 72%);
  box-shadow:
    inset 28px 0 70px rgba(247,255,195,.11),
    inset -82px 0 130px rgba(0,0,0,.98),
    0 0 44px rgba(250,90,31,.28),
    0 0 130px rgba(247,255,195,.14);
  filter: contrast(1.08);
}
.singularity-core::before {
  content: '';
  position: absolute;
  inset: 12%;
  border-radius: 50%;
  border: 1px solid rgba(247,255,195,.24);
  box-shadow:
    0 0 12px rgba(247,255,195,.08),
    inset 0 0 42px rgba(0,0,0,.8);
  transform: rotate(-16deg) scaleX(1.1);
}
.singularity-core::after {
  content: '';
  position: absolute;
  left: -2%;
  top: 45%;
  width: 84%;
  height: 16%;
  border-radius: 50%;
  border-top: 1px solid rgba(250,90,31,.52);
  border-bottom: 1px solid rgba(247,255,195,.16);
  filter: blur(.15px);
  transform: rotate(-8deg);
  opacity: .72;
}
#singularity-waves {
  mix-blend-mode: screen;
  opacity: .62;
}

/* ===== MENU ===== */
.menu {
  position: absolute;
  left: 8.1vw;
  top: 38.5vh;
  z-index: 10;
}

.menu-item {
  display: block;
  font-family: var(--f-title);
  font-weight: 900;
  font-size: clamp(28px, 3.4vw, 48px);
  color: var(--cream);
  letter-spacing: .02em;
  line-height: 1;
  text-decoration: none;
  cursor: none;
  transition: color .12s;
  opacity: 0;
  animation: fadeIn .4s ease forwards;
  margin-bottom: clamp(10px, 1.8vh, 22px);
}
.menu-item:nth-child(1) { animation-delay: .9s; }
.menu-item:nth-child(2) { animation-delay: 1.05s; }
.menu-item:nth-child(3) { animation-delay: 1.2s; }
.menu-item:nth-child(4) { animation-delay: 1.35s; }

.menu-item .arr {
  color: rgba(247,255,195,.25);
  display: inline-block;
  margin-right: 1px;
  transition: color .12s, transform .12s;
  font-family: var(--f-pixel);
  font-weight: 400;
  font-size: .7em;
  vertical-align: middle;
}
.menu-item.active { color: var(--orange); }
.menu-item.active .arr { color: var(--orange); }
.menu-item:not(.active):hover { color: #fff; }
.menu-item:hover .arr { color: var(--orange); transform: translateX(4px); }

/* ===== DISCORD ===== */
.discord {
  position: absolute;
  left: 8.1vw;
  bottom: 8.3vh;
  width: 54px; height: 42px;
  background: var(--orange);
  display: flex; align-items: center; justify-content: center;
  cursor: none;
  z-index: 10;
  opacity: 0;
  animation: fadeIn .4s ease forwards 1.6s;
  transition: background .12s;
  text-decoration: none;
}
.discord:hover { background: #ff6b35; }
.discord svg { width: 26px; height: 20px; fill: #000; }

/* ===== LOGO ===== */
.logo {
  position: absolute;
  right: 5.6vw;
  bottom: 5.6vh;
  text-align: right;
  z-index: 10;
  opacity: 0;
  animation: fadeIn .7s ease forwards .4s;
}
.logo-text {
  font-family: var(--f-logo);
  font-weight: 400;
  font-size: clamp(72px, 10vw, 150px);
  color: var(--cream);
  line-height: .92;
  letter-spacing: -.01em;
  display: flex;
  justify-content: flex-end;
  gap: 0;
}

.logo-letter {
  display: inline-block;
  transition:
    transform .08s steps(2,end),
    opacity .08s steps(2,end),
    filter .08s steps(2,end),
    text-shadow .08s steps(2,end);
  transform-origin: center center;
}

#logo-arecibo:hover .logo-letter {
  color: var(--cream);
  animation: logoSignalBreak .24s steps(2,end) infinite;
  filter: contrast(1.8) brightness(1.15);
  text-shadow:
    -3px 0 rgba(250,90,31,.48),
    3px 0 rgba(247,255,195,.28),
    0 2px rgba(0,0,0,.72);
}

#logo-arecibo {
  position: relative;
  cursor: none;
}
#logo-arecibo::before,
#logo-arecibo::after {
  content: '';
  position: absolute;
  inset: -4px -6px;
  opacity: 0;
  pointer-events: none;
}
#logo-arecibo::before {
  content: attr(data-text);
  color: rgba(247,255,195,.42);
  text-shadow:
    -4px 0 rgba(250,90,31,.42),
    4px 0 rgba(247,255,195,.2);
  clip-path: inset(0 0 54% 0);
}
#logo-arecibo::after {
  background: none;
  mix-blend-mode: normal;
}
#logo-arecibo:hover::before {
  opacity: .8;
  animation: logoSignalSlice .18s steps(2,end) infinite;
}
#logo-arecibo:hover::after {
  opacity: .18;
  animation: logoPixelMask .16s steps(2,end) infinite;
}

#particles-canvas {
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: 3;
}
.logo-sub {
  font-family: var(--f-pixel);
  font-size: 10px;
  color: rgba(247,255,195,.18);
  letter-spacing: .14em;
  margin-top: 8px;
}

.coord {
  position: absolute;
  bottom: 10px; right: 14px;
  font-family: var(--f-pixel);
  font-size: 9px;
  color: rgba(247,255,195,.1);
  letter-spacing: .1em;
  z-index: 10;
}

.crt-filter-defs {
  position: absolute;
  width: 0;
  height: 0;
  overflow: hidden;
}

@keyframes crtBreath {
  0%, 100% { transform: perspective(900px) translateZ(0) scale(1.026) rotateX(.16deg); }
  50% { transform: perspective(900px) translateZ(0) scale(1.031) rotateX(.24deg) translateY(.35px); }
}

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(10px); }
  to   { opacity: 1; transform: translateY(0); }
}



@keyframes logoSignalBreak {
  0% { transform: translate(0,0) skewX(0deg) scaleY(1); opacity: 1; }
  22% { transform: translate(-2px,1px) skewX(-2deg) scaleY(.94); opacity: .86; }
  47% { transform: translate(3px,-1px) skewX(2deg) scaleY(1.04); opacity: .98; }
  72% { transform: translate(-1px,2px) skewX(1deg) scaleY(.9); opacity: .78; }
  100% { transform: translate(2px,0) skewX(-1deg) scaleY(1.02); opacity: .93; }
}

@keyframes logoSignalSlice {
  0% { clip-path: inset(0 0 62% 0); transform: translate(6px,-2px); }
  25% { clip-path: inset(28% 0 40% 0); transform: translate(-7px,3px); }
  50% { clip-path: inset(54% 0 20% 0); transform: translate(5px,1px); }
  75% { clip-path: inset(12% 0 68% 0); transform: translate(-4px,-1px); }
  100% { clip-path: inset(42% 0 34% 0); transform: translate(8px,2px); }
}

@keyframes logoPixelMask {
  0% { transform: translate(0,0); opacity: .12; }
  33% { transform: translate(4px,-2px); opacity: .22; }
  66% { transform: translate(-3px,2px); opacity: .16; }
  100% { transform: translate(2px,1px); opacity: .2; }
}

@media (prefers-reduced-motion: reduce) {
  .screen { animation: none; }
  #logo-arecibo:hover .logo-letter,
  #logo-arecibo:hover::before,
  #logo-arecibo:hover::after { animation: none; }
}

.page-transition {
  position: fixed; inset: 0;
  background: #000;
  z-index: 100;
  opacity: 0; pointer-events: none;
  transition: opacity .4s ease;
}
.page-transition.active { opacity: 1; pointer-events: all; }
</style>
</head>

<script>
(function() {
  const c = document.getElementById('starfield-bg');
  const ctx = c.getContext('2d');
  c.width = window.innerWidth;
  c.height = window.innerHeight;

  const STARS = 320;
  const stars = Array.from({ length: STARS }, (_, i) => ({
    x: Math.random() * c.width,
    y: Math.random() * c.height,
    r: i < 20 ? 1.2 : i < 80 ? 0.8 : 0.5,
    a: 0.1 + Math.random() * 0.7,
  }));

  ctx.fillStyle = '#000';
  ctx.fillRect(0, 0, c.width, c.height);
  stars.forEach(s => {
    ctx.globalAlpha = s.a;
    ctx.fillStyle = '#F7FFC3';
    ctx.beginPath();
    ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
    ctx.fill();
  });
  ctx.globalAlpha = 1;
})();

(function() {
  const canvas = document.getElementById('singularity-waves');
  const wrap = canvas && canvas.parentElement;
  if (!canvas || !wrap) return;

  const ctx = canvas.getContext('2d');
  const reduceMotion = window.matchMedia('(prefers-reduced-motion: reduce)');
  let dpr = 1;
  let size = 0;

  function resizeWaves() {
    const rect = wrap.getBoundingClientRect();
    dpr = Math.min(window.devicePixelRatio || 1, 2);
    size = Math.max(1, Math.round(rect.width));
    canvas.width = Math.round(rect.width * dpr);
    canvas.height = Math.round(rect.height * dpr);
    canvas.style.width = rect.width + 'px';
    canvas.style.height = rect.height + 'px';
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  }

  function drawWaves(t) {
    ctx.clearRect(0, 0, size, size);
    const cx = size * .5;
    const cy = size * .5;
    const base = size * .43;

    for (let i = 0; i < 4; i++) {
      const pulse = ((t * .000055) + i * .24) % 1;
      const radius = base + pulse * size * .14;
      const alpha = (1 - pulse) * .13;

      ctx.beginPath();
      ctx.ellipse(cx - size * .045, cy + Math.sin(t * .0007 + i) * size * .006, radius * 1.08, radius * .78, -0.16, 0, Math.PI * 2);
      ctx.strokeStyle = `rgba(247,255,195,${alpha})`;
      ctx.lineWidth = 1;
      ctx.stroke();

      ctx.beginPath();
      ctx.ellipse(cx - size * .04, cy, radius * .96, radius * .68, -0.16, Math.PI * .05, Math.PI * 1.45);
      ctx.strokeStyle = `rgba(250,90,31,${alpha * .9})`;
      ctx.stroke();
    }

    ctx.beginPath();
    ctx.ellipse(cx - size * .05, cy, size * .36, size * .26, -0.16, 0, Math.PI * 2);
    ctx.strokeStyle = 'rgba(250,90,31,.18)';
    ctx.lineWidth = 1.2;
    ctx.stroke();

    if (!reduceMotion.matches) requestAnimationFrame(drawWaves);
  }

  resizeWaves();
  window.addEventListener('resize', resizeWaves);
  drawWaves(0);
})();

(function() {
  const reduceMotion = window.matchMedia('(prefers-reduced-motion: reduce)');
  const gravity = { x: 1588, y: 540, radius: 760 };

  function line(a, b, steps) {
    return Array.from({ length: steps + 1 }, (_, i) => {
      const p = i / steps;
      return { x: a.x + (b.x - a.x) * p, y: a.y + (b.y - a.y) * p };
    });
  }

  function cubic(a, c1, c2, b, steps) {
    return Array.from({ length: steps + 1 }, (_, i) => {
      const t = i / steps;
      const mt = 1 - t;
      return {
        x: mt * mt * mt * a.x + 3 * mt * mt * t * c1.x + 3 * mt * t * t * c2.x + t * t * t * b.x,
        y: mt * mt * mt * a.y + 3 * mt * mt * t * c1.y + 3 * mt * t * t * c2.y + t * t * t * b.y
      };
    });
  }

  function joined(a, b) { return a.concat(b.slice(1)); }

  const specs = [
    { id: 'gravity-lower-a', points: joined(line({ x: 1712, y: 671.529 }, { x: 1015.76, y: 671.528 }, 28), cubic({ x: 1015.76, y: 671.528 }, { x: 762.582, y: 704.691 }, { x: 215.717, y: 887.916 }, { x: 53.6834, y: 1355.51 }, 72)) },
    { id: 'gravity-lower-b', points: joined(line({ x: 1712, y: 621.784 }, { x: 914.489, y: 621.784 }, 30), cubic({ x: 914.489, y: 621.784 }, { x: 657.091, y: 642.511 }, { x: 109.383, y: 746.145 }, { x: -22.27, y: 994.867 }, 72)) },
    { id: 'gravity-upper-a', points: joined(line({ x: 1712, y: 471.985 }, { x: 1009.07, y: 471.985 }, 28), cubic({ x: 1009.07, y: 471.985 }, { x: 753.453, y: 438.822 }, { x: 201.33, y: 255.597 }, { x: 37.7381, y: -212 }, 72)) },
    { id: 'gravity-upper-b', points: joined(line({ x: 1712, y: 521.73 }, { x: 906.821, y: 521.73 }, 30), cubic({ x: 906.821, y: 521.73 }, { x: 646.948, y: 501.003 }, { x: 93.9728, y: 397.369 }, { x: -38.9457, y: 148.647 }, 72)) },
    { id: 'gravity-main', points: line({ x: -139, y: 571.757 }, { x: 1712, y: 571.757 }, 96) },
    { id: 'gravity-v-a', points: line({ x: 1611.95, y: 688.487 }, { x: 1611.95, y: 455.027 }, 44) },
    { id: 'gravity-v-b', points: line({ x: 1428.51, y: 688.487 }, { x: 1428.51, y: 455.027 }, 44) },
    { id: 'gravity-v-c', points: line({ x: 1245.08, y: 688.487 }, { x: 1245.08, y: 455.027 }, 44) },
    { id: 'gravity-v-d', points: line({ x: 994.945, y: 688.487 }, { x: 994.945, y: 455.027 }, 44) },
    { id: 'gravity-v-left', points: line({ x: 544.703, y: 821.892 }, { x: 544.703, y: 321.622 }, 56) }
  ].map(spec => ({ ...spec, el: document.getElementById(spec.id) })).filter(spec => spec.el);

  function distortedPoint(point, time, lineIndex, pointIndex) {
    const gx = gravity.x + Math.sin(time * .00034) * 9;
    const gy = gravity.y + Math.cos(time * .00028) * 5;
    const dx = gx - point.x;
    const dy = gy - point.y;
    const dist = Math.max(1, Math.hypot(dx, dy));
    const near = Math.max(0, 1 - dist / gravity.radius);
    const falloff = near * near;
    const ux = dx / dist;
    const uy = dy / dist;
    const pull = falloff * (26 + Math.sin(time * .001 + lineIndex) * 5);
    const swirl = falloff * Math.sin(time * .0014 + point.y * .018 + lineIndex) * 15;
    const drift = Math.sin(time * .0009 + point.x * .014 + lineIndex * 1.7) * (1.2 + falloff * 3.8);

    return {
      x: point.x + ux * pull - uy * swirl + Math.sin(time * .0007 + pointIndex * .3) * falloff * 2,
      y: point.y + uy * pull + ux * swirl + drift
    };
  }

  function toPath(points) {
    return points.map((point, i) => `${i === 0 ? 'M' : 'L'}${point.x.toFixed(2)} ${point.y.toFixed(2)}`).join('');
  }

  function drawGravity(time) {
    specs.forEach((spec, lineIndex) => {
      const points = spec.points.map((point, pointIndex) => distortedPoint(point, time, lineIndex, pointIndex));
      spec.el.setAttribute('d', toPath(points));
    });
    if (!reduceMotion.matches) requestAnimationFrame(drawGravity);
  }

  drawGravity(0);
})();

  cursor.style.top = e.clientY + 'px';
});

document.querySelectorAll('.menu-item').forEach(item => {

function goTo(e, page) {
  e.preventDefault();
  const t = document.getElementById('transition');
  t.classList.add('active');
  setTimeout(() => { window.location.href = 'arecibo_' + page + '.html'; }, 420);
}

function openSettings(e) {
  e.preventDefault();
  const overlay = document.getElementById('settings-overlay');
  overlay.classList.add('open');
  setTimeout(() => overlay.querySelector('.settings-panel').classList.add('visible'), 10);
}

function closeSettings() {
  const overlay = document.getElementById('settings-overlay');
  overlay.querySelector('.settings-panel').classList.remove('visible');
  setTimeout(() => overlay.classList.remove('open'), 320);
}

function updateSlider(el, valId) {
  document.getElementById(valId).textContent = el.value + '%';
}

function selectLang(btn) {
  document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('sel'));
  btn.classList.add('sel');
}

function toggleSwitch(el) {
  el.classList.toggle('on');
}

(function() {
  const canvas = document.getElementById('particles-canvas');
  const ctx = canvas.getContext('2d');

  function resize() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
  }
  resize();
  window.addEventListener('resize', resize);

  const COUNT = 22;
  const particles = Array.from({ length: COUNT }, (_, i) => ({
    x: Math.random() * window.innerWidth,
    y: Math.random() * window.innerHeight,
    size: i < 4 ? 3 : i < 12 ? 2 : 1,
    vx: (Math.random() - 0.5) * 0.22,
    vy: (Math.random() - 0.5) * 0.18,
    opacity: 0.35 + Math.random() * 0.55,
    twinkle: Math.random() * Math.PI * 2,
    twinkleSpeed: 0.003 + Math.random() * 0.007,
  }));

  function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    particles.forEach(p => {
      p.twinkle += p.twinkleSpeed;
      const alpha = p.opacity * (0.5 + 0.5 * Math.sin(p.twinkle));
      ctx.fillStyle = `rgba(247,255,195,${alpha.toFixed(3)})`;
      ctx.fillRect(Math.round(p.x), Math.round(p.y), p.size, p.size);
      p.x += p.vx;
      p.y += p.vy;
      if (p.x < -5) { p.x = canvas.width + 5; }
      if (p.x > canvas.width + 5) { p.x = -5; }
      if (p.y < -5) { p.y = canvas.height + 5; }
      if (p.y > canvas.height + 5) { p.y = -5; }
    });
    requestAnimationFrame(draw);
  }
  draw();
})();

(function() {
  const logo = document.getElementById('logo-arecibo');
  if (!logo) return;
  const letters = logo.querySelectorAll('.logo-letter');
  let noiseTimer = null;

  function scrambleLogo() {
    letters.forEach((l, i) => {
      const x = Math.round((Math.random() - .5) * 8);
      const y = Math.round((Math.random() - .5) * 5);
      const squash = .9 + Math.random() * .18;
      l.style.transform = `translate(${x}px, ${y}px) scaleY(${squash})`;
      l.style.opacity = String(.78 + Math.random() * .22);
      l.style.filter = `contrast(1.9) brightness(${1.05 + Math.random() * .2}) blur(${Math.random() > .72 ? .8 : 0}px)`;
      l.style.textShadow = `${-3 + (i % 2)}px 0 rgba(250,90,31,.45), ${2 + (i % 3)}px 0 rgba(247,255,195,.25)`;
    });
  }

  logo.addEventListener('mouseenter', () => {
    scrambleLogo();
    noiseTimer = setInterval(scrambleLogo, 70);
  });

  logo.addEventListener('mouseleave', () => {
    clearInterval(noiseTimer);
    noiseTimer = null;
    letters.forEach(l => {
      l.style.transform = '';
      l.style.opacity = '';
      l.style.filter = '';
      l.style.textShadow = '';
    });
  });
})();
</script>
