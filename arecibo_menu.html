<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ARECIBO</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Pixelify+Sans:wght@400;500;700&display=swap');

@font-face {
  font-family: 'Power Grotesk';
  src: url('fonts/PowerGrotesk-Regular.woff2') format('woff2'),
       url('fonts/PowerGrotesk-Regular.woff') format('woff');
  font-weight: 400;
}
@font-face {
  font-family: 'Power Grotesk';
  src: url('fonts/PowerGrotesk-Bold.woff2') format('woff2'),
       url('fonts/PowerGrotesk-Bold.woff') format('woff');
  font-weight: 700 900;
}
@font-face {
  font-family: 'Degular';
  src: url('fonts/Degular-Black.woff2') format('woff2'),
       url('fonts/Degular-Black.woff') format('woff');
  font-weight: 900;
}
@font-face {
  font-family: 'Degular';
  src: url('fonts/Degular-Bold.woff2') format('woff2'),
       url('fonts/Degular-Bold.woff') format('woff');
  font-weight: 700;
}

:root {
  --cream: #F7FFC3;
  --orange: #FA5A1F;
  --bg: #000;
  --f-logo:  'Power Grotesk',  sans-serif;
  --f-title: 'Degular',        sans-serif;
  --f-pixel: 'Pixelify Sans',  monospace;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: var(--bg);
  width: 100vw; height: 100vh;
  overflow: hidden;
  font-family: var(--f-pixel);
  cursor: none;
}

.cursor {
  position: fixed;
  width: 14px; height: 14px;
  border: 1.5px solid var(--cream);
  pointer-events: none;
  z-index: 9999;
  transform: translate(-50%,-50%);
}
.cursor::after {
  content: '';
  position: absolute;
  top: 50%; left: 50%;
  width: 3px; height: 3px;
  background: var(--orange);
  transform: translate(-50%,-50%);
}

.screen {
  position: relative;
  width: 100vw; height: 100vh;
  overflow: hidden;
}

/* Background starfield */
.starfield {
  position: absolute;
  inset: 0;
  background: url('starfield.png') center/cover no-repeat;
  opacity: .9;
}

/* Scanlines */
.screen::after {
  content: '';
  position: absolute;
  inset: 0;
  background: repeating-linear-gradient(0deg,transparent,transparent 3px,rgba(0,0,0,.04) 3px,rgba(0,0,0,.04) 4px);
  pointer-events: none;
  z-index: 20;
}

/* ===== LIGNES ORANGE — SVG EXACT DEPUIS FIGMA ===== */
/* Le frame Figma est 1920x1080, le SVG des lignes fait 1712x1080 */
/* On le positionne avec un offset de 208px à gauche pour correspondre */
.lines-wrap {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  pointer-events: none;
  z-index: 2;
}
.lines-wrap svg {
  position: absolute;
  top: 0;
  /* Le groupe de lignes dans Figma est positionné à gauche=139px dans un frame 1920px */
  /* Le SVG viewBox commence à -139 donc on le place à x=0 avec la pleine largeur */
  left: 0;
  width: 100%;
  height: 100%;
}

/* Cercles orbitaux (droite) — séparés car pas dans le SVG des lignes */
.circles-svg {
  position: absolute;
  top: 0; right: 0;
  width: 40%;
  height: 100%;
  pointer-events: none;
  z-index: 2;
}

/* ===== MENU — Degular Black ===== */
.menu {
  position: absolute;
  left: 8.1vw;
  top: 38.5vh;
  z-index: 10;
}

.menu-item {
  display: block;
  font-family: var(--f-title);
  font-weight: 900;
  font-size: clamp(28px, 3.4vw, 48px);
  color: var(--cream);
  letter-spacing: .02em;
  line-height: 1;
  text-decoration: none;
  cursor: none;
  transition: color .12s;
  opacity: 0;
  animation: fadeIn .4s ease forwards;
  margin-bottom: clamp(10px, 1.8vh, 22px);
}
.menu-item:nth-child(1) { animation-delay: .9s; }
.menu-item:nth-child(2) { animation-delay: 1.05s; }
.menu-item:nth-child(3) { animation-delay: 1.2s; }
.menu-item:nth-child(4) { animation-delay: 1.35s; }

.menu-item .arr {
  color: rgba(247,255,195,.25);
  display: inline-block;
  margin-right: 1px;
  transition: color .12s, transform .12s;
  font-family: var(--f-pixel);
  font-weight: 400;
  font-size: .7em;
  vertical-align: middle;
}
.menu-item.active { color: var(--orange); }
.menu-item.active .arr { color: var(--orange); }
.menu-item:not(.active):hover { color: #fff; }
.menu-item:hover .arr { color: var(--orange); transform: translateX(4px); }

/* ===== DISCORD ===== */
.discord {
  position: absolute;
  left: 8.1vw;
  bottom: 8.3vh;
  width: 54px; height: 42px;
  background: var(--orange);
  display: flex; align-items: center; justify-content: center;
  cursor: none;
  z-index: 10;
  opacity: 0;
  animation: fadeIn .4s ease forwards 1.6s;
  transition: background .12s;
}
.discord:hover { background: #ff6b35; }
.discord svg { width: 26px; height: 20px; fill: #000; }

/* ===== LOGO — Power Grotesk ===== */
.logo {
  position: absolute;
  right: 5.6vw;
  bottom: 5.6vh;
  text-align: right;
  z-index: 10;
  opacity: 0;
  animation: fadeIn .7s ease forwards .4s;
}
.logo-text {
  font-family: var(--f-logo);
  font-weight: 400;
  font-size: clamp(72px, 10vw, 150px);
  color: var(--cream);
  line-height: .92;
  letter-spacing: -.01em;
  display: flex;
  justify-content: flex-end;
  gap: 0;
}

/* Distorsion trou noir — chaque lettre */
.logo-letter {
  display: inline-block;
  transition:
    transform .6s cubic-bezier(.4,0,.2,1),
    opacity .6s ease,
    filter .6s ease,
    color .4s ease;
  transform-origin: center center;
}

/* Au hover du logo — les lettres s'aspirent vers le centre */
#logo-arecibo:hover .logo-letter {
  --dist: calc((var(--i) - 3) * 1px);
  transform: scaleX(0.3) scaleY(0.6) translateX(calc((3 - var(--i)) * 18px));
  opacity: 0.2;
  filter: blur(3px);
  color: var(--orange);
}

/* Anneau de lumière autour du logo au hover */
#logo-arecibo {
  position: relative;
  cursor: none;
}
#logo-arecibo::after {
  content: '';
  position: absolute;
  inset: -8px;
  border-radius: 50%;
  background: radial-gradient(ellipse at center, rgba(250,90,31,.12) 0%, transparent 70%);
  opacity: 0;
  transition: opacity .5s ease;
  pointer-events: none;
}
#logo-arecibo:hover::after { opacity: 1; }

/* Canvas particules */
#particles-canvas {
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: 1;
}
.logo-sub {
  font-family: var(--f-pixel);
  font-size: 10px;
  color: rgba(247,255,195,.18);
  letter-spacing: .14em;
  margin-top: 8px;
}

.coord {
  position: absolute;
  bottom: 10px; right: 14px;
  font-family: var(--f-pixel);
  font-size: 9px;
  color: rgba(247,255,195,.1);
  letter-spacing: .1em;
  z-index: 10;
}

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(10px); }
  to   { opacity: 1; transform: translateY(0); }
}

/* Transition page */
.page-transition {
  position: fixed; inset: 0;
  background: #000;
  z-index: 100;
  opacity: 0; pointer-events: none;
  transition: opacity .4s ease;
}
.page-transition.active { opacity: 1; pointer-events: all; }
</style>
</head>
<body>
<div class="cursor" id="cursor"></div>
<div class="page-transition" id="transition"></div>

<div class="screen">
  <div class="starfield"></div>

  <!-- LIGNES ORANGE — PATHS EXACTS EXPORTÉS DEPUIS FIGMA -->
  <!-- viewBox="0 0 1712 1080" sur un frame 1920x1080 -->
  <!-- Le groupe est positionné à Gauche: 139px dans le frame, -->
  <!-- d'où le viewBox qui commence à -139 dans les coordonnées Figma -->
  <div class="lines-wrap">
    <svg viewBox="-139 0 1851 1080" preserveAspectRatio="xMidYMid meet" fill="none" xmlns="http://www.w3.org/2000/svg">
      <!-- Courbes basses (s'évasent vers le bas-droite) -->
      <path d="M1712 671.529L1015.76 671.528C762.582 704.691 215.717 887.916 53.6834 1355.51M1712 621.784L914.489 621.784C657.091 642.511 109.383 746.145 -22.27 994.867" stroke="#FA5A1F" stroke-width="1"/>
      <!-- Courbes hautes (s'évasent vers le haut-droite) -->
      <path d="M1712 471.985L1009.07 471.985C753.453 438.822 201.33 255.597 37.7381 -212M1712 521.73L906.821 521.73C646.948 501.003 93.9728 397.369 -38.9457 148.647" stroke="#FA5A1F" stroke-width="1"/>
      <!-- Ligne horizontale principale -->
      <path d="M1611.95 571.757L-139 571.757" stroke="#FA5A1F" stroke-width="1"/>
      <!-- Lignes verticales courtes (grille droite) -->
      <path d="M1611.95 688.487L1611.95 455.027" stroke="#FA5A1F" stroke-width="1"/>
      <path d="M1428.51 688.487L1428.51 455.027" stroke="#FA5A1F" stroke-width="1"/>
      <path d="M1245.08 688.487L1245.08 455.027" stroke="#FA5A1F" stroke-width="1"/>
      <path d="M994.945 688.487L994.945 455.027" stroke="#FA5A1F" stroke-width="1"/>
      <!-- Ligne verticale longue (gauche) -->
      <path d="M544.703 821.892L544.703 321.622" stroke="#FA5A1F" stroke-width="1"/>
      <!-- Grand cercle unique à droite — centre hors écran, seul l'arc gauche est visible -->
    <circle cx="1620" cy="540" r="600" stroke="rgba(247,255,195,.14)" stroke-width="1" fill="none"/>
  </svg>
  </div>



  <!-- Menu -->
  <nav class="menu">
    <a class="menu-item active" href="#" onclick="goTo(event,'creation')"><span class="arr">></span>SOLO</a>
    <a class="menu-item" href="#" onclick="goTo(event,'lobby')"><span class="arr">></span>MULTI</a>
    <a class="menu-item" href="#" onclick="openSettings(event)"><span class="arr">></span>SETTINGS</a>
    <a class="menu-item" href="#"><span class="arr">></span>CREDITS</a>
  </nav>

  <!-- Discord -->
  <div class="discord">
    <svg viewBox="0 0 24 18"><path d="M20.317 1.492a19.825 19.825 0 0 0-4.885-1.515.074.074 0 0 0-.079.037c-.21.375-.444.864-.608 1.25a18.301 18.301 0 0 0-5.487 0 12.764 12.764 0 0 0-.617-1.25.077.077 0 0 0-.079-.037A19.736 19.736 0 0 0 3.677 1.492a.07.07 0 0 0-.032.027C.533 6.093-.32 10.555.099 14.961a.082.082 0 0 0 .031.057 19.9 19.9 0 0 0 5.993 3.03.078.078 0 0 0 .084-.028c.462-.63.874-1.295 1.226-1.994a.076.076 0 0 0-.041-.106 13.107 13.107 0 0 1-1.872-.892.077.077 0 0 1-.008-.128 10.2 10.2 0 0 0 .372-.292.074.074 0 0 1 .077-.01c3.928 1.793 8.18 1.793 12.062 0a.074.074 0 0 1 .078.01c.12.098.246.198.373.292a.077.077 0 0 1-.006.127 12.299 12.299 0 0 1-1.873.892.077.077 0 0 0-.041.107c.36.698.772 1.362 1.225 1.993a.076.076 0 0 0 .084.028 19.839 19.839 0 0 0 6.002-3.03.077.077 0 0 0 .032-.054c.5-5.177-.838-9.674-3.549-13.66a.061.061 0 0 0-.031-.03zM8.02 12.278c-1.183 0-2.157-1.085-2.157-2.419 0-1.333.956-2.419 2.157-2.419 1.21 0 2.176 1.096 2.157 2.42 0 1.333-.956 2.418-2.157 2.418zm7.975 0c-1.183 0-2.157-1.085-2.157-2.419 0-1.333.955-2.419 2.157-2.419 1.21 0 2.176 1.096 2.157 2.42 0 1.333-.946 2.418-2.157 2.418z"/></svg>
  </div>

  <!-- Logo ARECIBO avec distorsion trou noir -->
  <div class="logo">
    <div class="logo-text" id="logo-arecibo">
      <span class="logo-letter" style="--i:0">A</span><span class="logo-letter" style="--i:1">R</span><span class="logo-letter" style="--i:2">E</span><span class="logo-letter" style="--i:3">C</span><span class="logo-letter" style="--i:4">I</span><span class="logo-letter" style="--i:5">B</span><span class="logo-letter" style="--i:6">O</span>
    </div>
    <div class="logo-sub">version P-A 0-01</div>
  </div>

  <div class="coord">18h29m14s / −05°09′03″ // SECTOR UNKNOWN</div>

  <!-- Canvas particules — pixels blancs en apesanteur -->
  <canvas id="particles-canvas"></canvas>
</div>

<script>
const cursor = document.getElementById('cursor');
document.addEventListener('mousemove', e => {
  cursor.style.left = e.clientX + 'px';
  cursor.style.top  = e.clientY + 'px';
});

document.querySelectorAll('.menu-item').forEach(item => {
  item.addEventListener('mouseenter', () => {
    document.querySelectorAll('.menu-item').forEach(i => i.classList.remove('active'));
    item.classList.add('active');
  });
});

function goTo(e, page) {
  e.preventDefault();
  const t = document.getElementById('transition');
  t.classList.add('active');
  setTimeout(() => { window.location.href = 'arecibo_' + page + '.html'; }, 420);
}

function openSettings(e) {
  e.preventDefault();
  const overlay = document.getElementById('settings-overlay');
  overlay.classList.add('open');
  setTimeout(() => overlay.querySelector('.settings-panel').classList.add('visible'), 10);
}

function closeSettings() {
  const overlay = document.getElementById('settings-overlay');
  overlay.querySelector('.settings-panel').classList.remove('visible');
  setTimeout(() => overlay.classList.remove('open'), 320);
}

function updateSlider(el, valId) {
  document.getElementById(valId).textContent = el.value + '%';
}

function selectLang(btn) {
  document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('sel'));
  btn.classList.add('sel');
}

function toggleSwitch(el) {
  el.classList.toggle('on');
}

/* ===== PARTICULES EN APESANTEUR ===== */
(function() {
  const canvas = document.getElementById('particles-canvas');
  const ctx = canvas.getContext('2d');

  function resize() {
    canvas.width  = window.innerWidth;
    canvas.height = window.innerHeight;
  }
  resize();
  window.addEventListener('resize', resize);

  /* Peu de particules — 18 pixels blancs */
  const COUNT = 18;
  const particles = Array.from({ length: COUNT }, () => ({
    x: Math.random() * window.innerWidth,
    y: Math.random() * window.innerHeight,
    size: Math.random() < 0.3 ? 2 : 1,          // pixel 1×1 ou 2×2
    vx: (Math.random() - 0.5) * 0.18,            // dérive très lente
    vy: (Math.random() - 0.5) * 0.18,
    opacity: 0.15 + Math.random() * 0.55,
    twinkle: Math.random() * Math.PI * 2,         // phase de scintillement
    twinkleSpeed: 0.004 + Math.random() * 0.008,
  }));

  function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    particles.forEach(p => {
      /* Scintillement lent */
      p.twinkle += p.twinkleSpeed;
      const alpha = p.opacity * (0.6 + 0.4 * Math.sin(p.twinkle));

      ctx.fillStyle = `rgba(247,255,195,${alpha})`;
      ctx.fillRect(
        Math.round(p.x),
        Math.round(p.y),
        p.size,
        p.size
      );

      /* Dérive lente */
      p.x += p.vx;
      p.y += p.vy;

      /* Rebond doux sur les bords */
      if (p.x < 0)                   { p.x = 0;               p.vx *= -1; }
      if (p.x > canvas.width)        { p.x = canvas.width;    p.vx *= -1; }
      if (p.y < 0)                   { p.y = 0;               p.vy *= -1; }
      if (p.y > canvas.height)       { p.y = canvas.height;   p.vy *= -1; }
    });

    requestAnimationFrame(draw);
  }
  draw();
})();

/* ===== DISTORSION TROU NOIR — LOGO ===== */
(function() {
  const logo = document.getElementById('logo-arecibo');
  const letters = logo.querySelectorAll('.logo-letter');
  const CENTER = 3; // index de la lettre centrale (C)

  logo.addEventListener('mouseenter', () => {
    letters.forEach((l, i) => {
      const dist    = i - CENTER;
      const pull    = dist * 22;          // attraction vers le centre
      const squish  = 1 - Math.abs(dist) * 0.12;
      const blurAmt = Math.abs(dist) * 1.2;
      l.style.transform = `translateX(${-pull}px) scaleX(${squish}) scaleY(${0.5 + squish * 0.3})`;
      l.style.opacity   = String(0.08 + squish * 0.3);
      l.style.filter    = `blur(${blurAmt}px)`;
      l.style.color     = i === CENTER ? '#FA5A1F' : 'rgba(247,255,195,.3)';
    });
  });

  logo.addEventListener('mouseleave', () => {
    letters.forEach(l => {
      l.style.transform = '';
      l.style.opacity   = '';
      l.style.filter    = '';
      l.style.color     = '';
    });
  });
})();
</script>

<!-- ===== SETTINGS OVERLAY ===== -->
<style>
#settings-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,.7);
  z-index: 200;
  align-items: center;
  justify-content: center;
  backdrop-filter: blur(2px);
}
#settings-overlay.open { display: flex; }

.settings-panel {
  background: #050505;
  border: 1px solid rgba(247,255,195,.3);
  width: 360px;
  font-family: 'Pixelify Sans', monospace;
  opacity: 0;
  transform: scale(.92) translateY(10px);
  transition: opacity .3s ease, transform .3s ease;
  cursor: none;
  border-radius: 4px;
  overflow: hidden;
}
.settings-panel.visible {
  opacity: 1;
  transform: scale(1) translateY(0);
}

/* Header */
.sp-header {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 10px 14px;
  border-bottom: 1px solid rgba(247,255,195,.15);
}
.sp-close {
  background: none;
  border: none;
  color: rgba(247,255,195,.5);
  font-family: 'Pixelify Sans', monospace;
  font-size: 13px;
  cursor: none;
  padding: 0;
  line-height: 1;
  transition: color .12s;
}
.sp-close:hover { color: var(--orange); }
.sp-title {
  font-size: 11px;
  letter-spacing: .12em;
  color: var(--cream);
}

/* Sections */
.sp-body { padding: 16px 14px; display: flex; flex-direction: column; gap: 14px; }

/* Section pill label — orange border, transparent bg, rounded */
.sp-section-label {
  display: inline-block;
  background: transparent;
  color: var(--orange);
  border: 1.5px solid var(--orange);
  font-family: 'Pixelify Sans', monospace;
  font-size: 11px;
  letter-spacing: .08em;
  padding: 5px 16px;
  margin-bottom: 10px;
  border-radius: 20px;
}

/* Sliders */
.sp-slider-row {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 7px;
}
/* Slider label in a bordered box */
.sp-slider-label {
  font-size: 9px;
  letter-spacing: .06em;
  color: rgba(247,255,195,.8);
  padding: 3px 8px;
  border: 1px solid rgba(247,255,195,.3);
  border-radius: 4px;
  width: 110px;
  flex-shrink: 0;
  white-space: nowrap;
}
.sp-slider-row input[type="range"] {
  -webkit-appearance: none;
  flex: 1;
  height: 1.5px;
  background: rgba(247,255,195,.2);
  outline: none;
  cursor: none;
}
.sp-slider-row input[type="range"]::-webkit-slider-thumb {
  -webkit-appearance: none;
  width: 11px; height: 11px;
  background: var(--orange);
  border-radius: 50%;
  cursor: none;
  border: 2px solid #000;
  box-shadow: 0 0 0 1.5px var(--orange);
}
.sp-slider-row input[type="range"]::-moz-range-thumb {
  width: 11px; height: 11px;
  background: var(--orange);
  border-radius: 50%;
  border: 2px solid #000;
  cursor: none;
}
/* Percentage in an orange-bordered pill */
.sp-val {
  font-size: 9px;
  color: var(--orange);
  letter-spacing: .06em;
  padding: 2px 7px;
  border: 1px solid var(--orange);
  border-radius: 10px;
  width: 38px;
  text-align: center;
  flex-shrink: 0;
}

/* Languages */
.sp-lang-row {
  display: flex;
  gap: 6px;
}
.lang-btn {
  background: none;
  border: 1px solid rgba(247,255,195,.3);
  color: rgba(247,255,195,.6);
  font-family: 'Pixelify Sans', monospace;
  font-size: 9px;
  letter-spacing: .08em;
  padding: 5px 14px;
  cursor: none;
  transition: all .12s;
  border-radius: 4px;
}
.lang-btn:hover { border-color: rgba(247,255,195,.6); color: var(--cream); }
.lang-btn.sel { border-color: var(--orange); color: var(--orange); }

/* Toggles */
.sp-toggle-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 10px;
  margin-bottom: 7px;
}
.sp-toggle-row:last-child { margin-bottom: 0; }
/* Toggle label in a bordered box */
.sp-toggle-label {
  font-size: 9px;
  letter-spacing: .06em;
  color: rgba(247,255,195,.8);
  padding: 3px 8px;
  border: 1px solid rgba(247,255,195,.3);
  border-radius: 4px;
  flex: 1;
}
.sp-toggle {
  position: relative;
  width: 34px; height: 18px;
  background: rgba(247,255,195,.08);
  border: 1px solid rgba(247,255,195,.15);
  border-radius: 3px;
  cursor: none;
  flex-shrink: 0;
  transition: background .2s, border-color .2s;
}
.sp-toggle.on { background: var(--orange); border-color: var(--orange); }
.sp-toggle::after {
  content: '';
  position: absolute;
  top: 3px; left: 3px;
  width: 10px; height: 10px;
  background: var(--cream);
  border-radius: 1px;
  transition: left .2s;
}
.sp-toggle.on::after { left: 19px; }
</style>

<div id="settings-overlay" onclick="if(event.target===this)closeSettings()">
  <div class="settings-panel">

    <div class="sp-header">
      <button class="sp-close" onclick="closeSettings()">×</button>
      <span class="sp-title">MENU // SETTINGS //</span>
    </div>

    <div class="sp-body">

      <!-- SON -->
      <div>
        <div class="sp-section-label">Son</div>
        <div class="sp-slider-row">
          <span class="sp-slider-label">Volume général</span>
          <input type="range" min="0" max="100" value="80" oninput="updateSlider(this,'sv1')">
          <span class="sp-val" id="sv1">80%</span>
        </div>
        <div class="sp-slider-row">
          <span class="sp-slider-label">Musique</span>
          <input type="range" min="0" max="100" value="60" oninput="updateSlider(this,'sv2')">
          <span class="sp-val" id="sv2">60%</span>
        </div>
        <div class="sp-slider-row">
          <span class="sp-slider-label">Effets sonores</span>
          <input type="range" min="0" max="100" value="60" oninput="updateSlider(this,'sv3')">
          <span class="sp-val" id="sv3">60%</span>
        </div>
      </div>

      <!-- LANGUES -->
      <div>
        <div class="sp-section-label">Langues</div>
        <div class="sp-lang-row">
          <button class="lang-btn sel" onclick="selectLang(this)">Fr</button>
          <button class="lang-btn" onclick="selectLang(this)">Us</button>
          <button class="lang-btn" onclick="selectLang(this)">Es</button>
        </div>
      </div>

      <!-- DONNÉES -->
      <div>
        <div class="sp-section-label">Données</div>
        <div class="sp-toggle-row">
          <span class="sp-toggle-label">sauvegarde automatique</span>
          <div class="sp-toggle on" onclick="toggleSwitch(this)"></div>
        </div>
        <div class="sp-toggle-row">
          <span class="sp-toggle-label">Données de session</span>
          <div class="sp-toggle on" onclick="toggleSwitch(this)"></div>
        </div>
      </div>

    </div>
  </div>
</div>

</body>
</html>
