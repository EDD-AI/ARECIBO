<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>ARECIBO // Defense Asteroides</title>
<link rel="icon" type="image/png" href="assets/picto-arecibo-pageweb.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Pixelify+Sans:wght@400;700&display=swap" rel="stylesheet">
<script src="assets/visual-settings.js?v=pixel-dither-3"></script>
<link rel="stylesheet" href="assets/terminal-filter.css?v=global-pixel-dither-3">
<style>
:root {
  --bg:#060504;
  --cream:#f4efc6;
  --cream-soft:rgba(244,239,198,.72);
  --orange:#fa6b2e;
  --orange-soft:rgba(250,107,46,.26);
  --danger:#ea5a47;
  --green:#98f03b;
}

* { box-sizing:border-box; }

html,
body {
  margin:0;
  width:100%;
  min-height:100%;
  background:
    radial-gradient(circle at center, rgba(95,72,28,.18), transparent 40%),
    #000;
  color:var(--cream);
  font-family:'Pixelify Sans', monospace;
}

body {
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  overflow:hidden;
  background:
    linear-gradient(180deg, rgba(0,0,0,.28), rgba(0,0,0,.48)),
    radial-gradient(circle at center, rgba(95,72,28,.12), transparent 42%),
    url('assets/ship-launch-fond.png') center / cover no-repeat,
    #000;
}

.mission-stage {
  position:relative;
  width:min(46vw, calc(84vh * 0.557));
  aspect-ratio:427 / 767;
  min-width:320px;
  filter:drop-shadow(0 18px 42px rgba(0,0,0,.52));
}

.console-screen {
  position:absolute;
  inset:0;
  border:1px solid rgba(244,239,198,.16);
  border-radius:20px;
  overflow:hidden;
  background:
    linear-gradient(180deg, rgba(255,255,255,.03), transparent 12%),
    linear-gradient(180deg, rgba(255,255,255,.035), transparent 14%, rgba(0,0,0,.24) 100%),
    radial-gradient(circle at 50% 0%, rgba(244,239,198,.08), transparent 34%),
    #0a0a09;
  box-shadow:
    0 18px 42px rgba(0,0,0,.52),
    inset 0 0 24px rgba(0,0,0,.88),
    inset 0 0 0 1px rgba(244,239,198,.07);
}

.console-screen::before {
  content:'';
  position:absolute;
  inset:0;
  background:
    radial-gradient(circle at center, transparent 38%, rgba(0,0,0,.18) 72%, rgba(0,0,0,.52) 100%),
    repeating-linear-gradient(180deg, rgba(244,239,198,.038) 0 1px, transparent 1px 4px);
  pointer-events:none;
}

.playfield {
  position:absolute;
  inset:0;
  z-index:1;
  width:100%;
  height:100%;
  display:block;
  image-rendering:pixelated;
  border-radius:18px;
  background:rgba(0,0,0,.16);
}

.hud {
  position:absolute;
  inset:0;
  z-index:2;
  pointer-events:none;
  padding:28px 28px 26px;
  display:flex;
  flex-direction:column;
  justify-content:space-between;
}

.hud-top {
  display:flex;
  justify-content:space-between;
  align-items:flex-start;
  gap:10px;
}

.hud-label {
  font-size:16px;
  line-height:1.1;
  letter-spacing:.06em;
  text-transform:uppercase;
  color:var(--cream-soft);
  text-shadow:0 0 8px rgba(244,239,198,.12);
}

.hud-label strong {
  display:block;
  color:var(--orange);
  font-size:24px;
}

.hud-status {
  text-align:right;
}

.hud-bottom {
  display:flex;
  justify-content:space-between;
  align-items:flex-end;
  gap:10px;
}

.controls-copy {
  max-width:62%;
  font-size:14px;
  line-height:1.2;
  text-transform:uppercase;
  color:rgba(244,239,198,.5);
}

.role-badge {
  display:inline-flex;
  align-items:center;
  gap:6px;
  margin-top:8px;
  padding:5px 8px;
  border:1px solid rgba(244,239,198,.16);
  background:rgba(0,0,0,.28);
  color:rgba(244,239,198,.7);
  font-size:12px;
  line-height:1;
}

.role-badge strong {
  color:var(--orange);
  font-size:13px;
}

.wave-tag {
  min-width:70px;
  text-align:right;
  font-size:16px;
  color:var(--cream-soft);
}

.wave-tag strong {
  color:var(--orange);
  font-size:26px;
}

.message {
  position:absolute;
  inset:16% 10% 16%;
  z-index:3;
  border:1px solid rgba(244,239,198,.38);
  background:rgba(0,0,0,.84);
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  gap:14px;
  padding:18px 16px;
  text-align:center;
  opacity:0;
  pointer-events:none;
  transition:opacity .24s ease;
}

.message.is-open {
  opacity:1;
  pointer-events:auto;
}

.message-title {
  font-size:clamp(26px, 1.7vw, 34px);
  line-height:1;
  text-transform:uppercase;
  color:var(--orange);
}

.message-copy {
  font-size:18px;
  line-height:1.35;
  color:var(--cream);
}

.message-copy strong {
  color:var(--green);
}

.message.is-loss .message-title {
  color:var(--danger);
}

.message-actions {
  display:flex;
  gap:10px;
  flex-wrap:wrap;
  justify-content:center;
}

.message-btn {
  min-width:140px;
  min-height:46px;
  border:1px solid rgba(244,239,198,.42);
  background:rgba(0,0,0,.84);
  color:var(--cream);
  font:inherit;
  font-size:18px;
  text-transform:uppercase;
  cursor:pointer;
}

.message-btn:hover,
.message-btn:focus-visible {
  outline:none;
  border-color:rgba(250,107,46,.82);
  color:#fff8d9;
}

.control-hit {
  position:absolute;
  border:none;
  background:transparent;
  padding:0;
  cursor:pointer;
  border-radius:999px;
  touch-action:none;
}

.control-hit:focus-visible {
  outline:1px solid rgba(244,239,198,.48);
  outline-offset:3px;
}

.control-left {
  left:5%;
  bottom:4%;
  width:18%;
  height:12%;
}

.control-right {
  right:5%;
  bottom:4%;
  width:18%;
  height:12%;
}

.control-fire {
  left:50%;
  bottom:4.2%;
  width:24%;
  height:13%;
  transform:translateX(-50%);
  border-radius:14px;
}

.control-fire::before,
.control-fire::after {
  content:'';
  position:absolute;
  inset:0;
  border-radius:14px;
  pointer-events:none;
  transition:opacity .14s ease, transform .14s ease;
}

.control-fire::before {
  border:1px solid rgba(250,107,46,.54);
  background:
    linear-gradient(180deg, rgba(250,107,46,.12), rgba(0,0,0,.1)),
    rgba(0,0,0,.24);
  box-shadow:
    inset 0 0 12px rgba(250,107,46,.16),
    0 0 10px rgba(250,107,46,.08);
  opacity:.88;
}

.control-fire::after {
  content:'TIR';
  display:flex;
  align-items:center;
  justify-content:center;
  color:var(--orange);
  font-family:'Pixelify Sans', monospace;
  font-size:18px;
  letter-spacing:.08em;
}

.control-fire.is-hidden {
  opacity:0;
  pointer-events:none;
}

.control-fire.is-active::before {
  opacity:1;
  transform:translateY(1px);
  background:
    linear-gradient(180deg, rgba(250,107,46,.22), rgba(0,0,0,.14)),
    rgba(0,0,0,.3);
}

.coop-status {
  color:var(--orange);
}

@media (max-width: 900px) {
  .mission-stage {
    width:min(72vw, calc(80vh * 0.557));
    min-width:280px;
  }

  .console-screen {
    border-radius:16px;
  }

  .hud {
    padding:18px 18px 22px;
  }

  .hud-label { font-size:12px; }
  .hud-label strong { font-size:18px; }
  .controls-copy { font-size:11px; }
  .wave-tag { font-size:12px; }
  .wave-tag strong { font-size:20px; }
  .message {
    inset:14% 7% 16%;
  }
  .message-copy {
    font-size:15px;
  }
  .control-left,
  .control-right {
    width:19%;
    height:12.5%;
    bottom:3%;
  }
  .control-fire {
    width:28%;
    height:13.5%;
    bottom:3.1%;
  }
  .control-fire::after {
    font-size:16px;
  }
}
</style>
</head>
<body>
  <main class="mission-stage" aria-label="Module defense asteroides">
    <section class="console-screen">
      <canvas class="playfield" id="playfield" width="192" height="384" aria-label="Mini jeu defense asteroides"></canvas>

      <div class="hud">
        <div class="hud-top">
          <div class="hud-label">
            <strong>defense</strong>
            asteroides
          </div>
          <div class="hud-label hud-status" id="hud-status">
            <strong>00 / 20</strong>
            neutralises
          </div>
        </div>

        <div class="hud-bottom">
          <div class="controls-copy" id="controls-copy">bouge avec les fleches ou les boutons.<br>tir automatique actif.</div>
          <div class="wave-tag" id="wave-tag">
            <strong>V01</strong>
            ligne
          </div>
        </div>
      </div>

      <div class="message" id="message-panel" aria-live="polite">
        <div class="message-title" id="message-title">demarrage module</div>
        <div class="message-copy" id="message-copy">Neutralise tous les debris avant qu ils ne traversent l ecran.</div>
        <div class="message-actions">
          <button class="message-btn" type="button" id="primary-action">jouer</button>
          <button class="message-btn" type="button" id="secondary-action">retour</button>
        </div>
      </div>
    </section>

    <button class="control-hit control-left" id="move-left" aria-label="Deplacer a gauche"></button>
    <button class="control-hit control-right" id="move-right" aria-label="Deplacer a droite"></button>
    <button class="control-hit control-fire is-hidden" id="fire-button" aria-label="Declencher le tir"></button>
  </main>

<script>
(() => {
  const params = new URLSearchParams(window.location.search);
  const totalAsteroids = 20;
  const logicalWidth = 192;
  const logicalHeight = 384;
  const canvas = document.getElementById('playfield');
  const ctx = canvas.getContext('2d');
  const statusEl = document.getElementById('hud-status');
  const waveEl = document.getElementById('wave-tag');
  const messagePanel = document.getElementById('message-panel');
  const messageTitle = document.getElementById('message-title');
  const messageCopy = document.getElementById('message-copy');
  const primaryAction = document.getElementById('primary-action');
  const secondaryAction = document.getElementById('secondary-action');
  const moveLeftBtn = document.getElementById('move-left');
  const moveRightBtn = document.getElementById('move-right');
  const fireButton = document.getElementById('fire-button');
  const controlsCopy = document.getElementById('controls-copy');

  const sessionId = String(params.get('session') || 'solo-defense').replace(/[^a-z0-9_-]/gi, '').slice(0, 24) || 'solo-defense';
  const returnUrl = params.get('return') || '';
  const stateKey = `arecibo:minigame-defense-state:${sessionId}`;
  const scoreKey = `arecibo:minigame-defense-score:${sessionId}`;
  const prefersReducedMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
  const storedPlayers = Number(localStorage.getItem('areciboPlayerCount'));
  const requestedPlayers = Number(params.get('players'));
  const playerCount = Math.max(1, Math.min(6, requestedPlayers || storedPlayers || 1));
  const coopMode = playerCount >= 2;

  const ship = { x:logicalWidth / 2, y:logicalHeight - 28, speed:150, width:13, height:10 };
  const keys = { left:false, right:false };
  const shootState = { active:false, cooldown:0 };
  const bullets = [];
  const asteroids = [];
  const stars = Array.from({ length: 34 }, () => ({
    x:Math.random() * logicalWidth,
    y:Math.random() * logicalHeight,
    speed:8 + Math.random() * 22,
    brightness:0.2 + Math.random() * 0.8
  }));
  const sparks = [];
  const pointerControl = {
    dragging:false,
    pointerId:null
  };

  let gameState = 'idle';
  let spawned = 0;
  let destroyed = 0;
  let lastTime = performance.now();
  let spawnTimer = 0;
  let fireTimer = 0;
  let waveIndex = 1;
  let frameId = 0;

  function writeState(state) {
    localStorage.setItem(stateKey, state);
    localStorage.setItem(scoreKey, JSON.stringify({ destroyed, total:totalAsteroids, updatedAt:Date.now() }));
  }

  function clampShipX(value) {
    return Math.max(16, Math.min(logicalWidth - 16, value));
  }

  function getCanvasPoint(event) {
    const rect = canvas.getBoundingClientRect();
    const x = ((event.clientX - rect.left) / rect.width) * logicalWidth;
    const y = ((event.clientY - rect.top) / rect.height) * logicalHeight;
    return { x, y };
  }

  function isPointerOnShip(point) {
    return Math.abs(point.x - ship.x) <= 16 && Math.abs(point.y - ship.y) <= 18;
  }

  function showMessage({ title, copy, primaryLabel, secondaryLabel = 'retour', onPrimary, onSecondary, loss = false }) {
    messageTitle.textContent = title;
    messageCopy.innerHTML = copy;
    primaryAction.textContent = primaryLabel;
    secondaryAction.textContent = secondaryLabel;
    messagePanel.classList.toggle('is-loss', loss);
    messagePanel.classList.add('is-open');

    primaryAction.onclick = onPrimary;
    secondaryAction.onclick = onSecondary;
  }

  function hideMessage() {
    messagePanel.classList.remove('is-open', 'is-loss');
  }

  function exitMiniGame() {
    if (window.opener && !window.opener.closed) {
      window.close();
      return;
    }
    if (returnUrl) {
      window.location.href = returnUrl;
      return;
    }
    window.location.href = 'arecibo_game.html?landing=1';
  }

  function updateHud() {
    statusEl.innerHTML = `<strong>${String(destroyed).padStart(2, '0')} / ${String(totalAsteroids).padStart(2, '0')}</strong>neutralises`;
    waveEl.innerHTML = `<strong>V${String(waveIndex).padStart(2, '0')}</strong>ligne`;
  }

  function updateControlCopy() {
    if (!controlsCopy) return;
    if (!coopMode) {
      controlsCopy.innerHTML = 'bouge avec les fleches ou les boutons.<br>tir automatique actif.';
      return;
    }
    controlsCopy.innerHTML = 'pilote : fleches, boutons ou glisser.<br><span class="coop-status">tireur : espace, entree ou bouton tir.</span><div class="role-badge"><strong>COOP</strong><span>2 roles actifs</span></div>';
  }

  function resetRun() {
    spawned = 0;
    destroyed = 0;
    waveIndex = 1;
    spawnTimer = 0.2;
    fireTimer = 0.06;
    shootState.active = false;
    shootState.cooldown = 0;
    bullets.length = 0;
    asteroids.length = 0;
    sparks.length = 0;
    ship.x = logicalWidth / 2;
    ship.y = logicalHeight - 28;
    gameState = 'playing';
    writeState('playing');
    updateHud();
    hideMessage();
  }

  function startGame() {
    resetRun();
  }

  function finishGame(victory) {
    gameState = victory ? 'won' : 'lost';
    writeState(victory ? 'won' : 'lost');

    if (victory) {
      showMessage({
        title:'secteur nettoye',
        copy:`<strong>${destroyed} debris neutralises.</strong><br>La trajectoire est de nouveau sure.`,
        primaryLabel:'terminer',
        secondaryLabel:'rejouer',
        onPrimary:exitMiniGame,
        onSecondary:startGame
      });
    } else {
      showMessage({
        title:'breche detectee',
        copy:`Un debris a traverse la ligne de defense.<br>Le module se coupe et la sortie est compromise.`,
        primaryLabel:'terminer',
        secondaryLabel:'rejouer',
        onPrimary:exitMiniGame,
        onSecondary:startGame,
        loss:true
      });
    }
  }

  function spawnAsteroid() {
    if (spawned >= totalAsteroids) return;
    const radius = 5 + Math.floor(Math.random() * 3);
    const speed = 24 + Math.random() * 22 + (spawned / totalAsteroids) * 10;
    const xPadding = 12 + radius;
    asteroids.push({
      x:xPadding + Math.random() * (logicalWidth - xPadding * 2),
      y:-18 - Math.random() * 36,
      radius,
      speed,
      wobble:Math.random() * Math.PI * 2,
      wobbleStrength:1 + Math.random() * 1.5,
      hp:1,
      color:Math.random() > 0.6 ? '#d5c8a1' : '#efe8c0'
    });
    spawned += 1;
    waveIndex = Math.min(9, 1 + Math.floor(spawned / 3));
    updateHud();
  }

  function shoot() {
    bullets.push({
      x:ship.x,
      y:ship.y - 9,
      speed:216
    });
  }

  function triggerManualShot() {
    if (!coopMode || gameState !== 'playing') return;
    if (shootState.cooldown > 0) return;
    shoot();
    shootState.cooldown = prefersReducedMotion ? 0.28 : 0.18;
  }

  function spawnImpact(x, y, tone = 'success') {
    const count = tone === 'success' ? 7 : 10;
    for (let i = 0; i < count; i += 1) {
      sparks.push({
        x,
        y,
        vx:(Math.random() - 0.5) * 55,
        vy:(Math.random() - 0.5) * 55,
        life:0.18 + Math.random() * 0.28,
        maxLife:0.18 + Math.random() * 0.28,
        color:tone === 'success'
          ? (Math.random() > 0.55 ? '#fa6b2e' : '#f4efc6')
          : '#ea5a47'
      });
    }
  }

  function updateStars(dt) {
    stars.forEach(star => {
      star.y += star.speed * dt;
      if (star.y > logicalHeight + 2) {
        star.y = -2;
        star.x = Math.random() * logicalWidth;
        star.speed = 8 + Math.random() * 22;
      }
    });
  }

  function updateGame(dt) {
    if (gameState !== 'playing') return;

    if (keys.left && !keys.right) ship.x -= ship.speed * dt;
    if (keys.right && !keys.left) ship.x += ship.speed * dt;
    ship.x = clampShipX(ship.x);

    if (coopMode) {
      shootState.cooldown = Math.max(0, shootState.cooldown - dt);
      if (shootState.active && shootState.cooldown <= 0) {
        triggerManualShot();
      }
    } else {
      fireTimer -= dt;
      if (fireTimer <= 0) {
        shoot();
        fireTimer = prefersReducedMotion ? 0.22 : 0.16;
      }
    }

    spawnTimer -= dt;
    if (spawned < totalAsteroids && spawnTimer <= 0) {
      spawnAsteroid();
      spawnTimer = 0.36 + Math.random() * 0.42;
    }

    bullets.forEach(bullet => {
      bullet.y -= bullet.speed * dt;
    });

    asteroids.forEach(asteroid => {
      asteroid.y += asteroid.speed * dt;
      asteroid.wobble += dt * 2.1;
      asteroid.x += Math.sin(asteroid.wobble) * asteroid.wobbleStrength * dt * 10;
    });

    sparks.forEach(spark => {
      spark.x += spark.vx * dt;
      spark.y += spark.vy * dt;
      spark.life -= dt;
    });

    for (let bulletIndex = bullets.length - 1; bulletIndex >= 0; bulletIndex -= 1) {
      const bullet = bullets[bulletIndex];
      if (bullet.y < -8) {
        bullets.splice(bulletIndex, 1);
        continue;
      }

      for (let asteroidIndex = asteroids.length - 1; asteroidIndex >= 0; asteroidIndex -= 1) {
        const asteroid = asteroids[asteroidIndex];
        const dx = bullet.x - asteroid.x;
        const dy = bullet.y - asteroid.y;
        if ((dx * dx) + (dy * dy) <= (asteroid.radius + 3) * (asteroid.radius + 3)) {
          spawnImpact(asteroid.x, asteroid.y, 'success');
          bullets.splice(bulletIndex, 1);
          asteroids.splice(asteroidIndex, 1);
          destroyed += 1;
          updateHud();
          break;
        }
      }
    }

    for (let asteroidIndex = asteroids.length - 1; asteroidIndex >= 0; asteroidIndex -= 1) {
      const asteroid = asteroids[asteroidIndex];
      if (asteroid.y - asteroid.radius > logicalHeight - 18) {
        spawnImpact(asteroid.x, logicalHeight - 18, 'danger');
        finishGame(false);
        return;
      }
    }

    for (let sparkIndex = sparks.length - 1; sparkIndex >= 0; sparkIndex -= 1) {
      if (sparks[sparkIndex].life <= 0) sparks.splice(sparkIndex, 1);
    }

    if (spawned >= totalAsteroids && asteroids.length === 0) {
      finishGame(true);
    }
  }

  function drawShip() {
    const left = Math.round(ship.x - ship.width / 2);
    const top = Math.round(ship.y - ship.height / 2);

    ctx.fillStyle = '#f4efc6';
    ctx.fillRect(left + 5, top, 3, 2);
    ctx.fillRect(left + 4, top + 2, 5, 2);
    ctx.fillRect(left + 3, top + 4, 7, 2);
    ctx.fillRect(left + 1, top + 6, 11, 2);
    ctx.fillRect(left, top + 8, 13, 2);

    ctx.fillStyle = '#fa6b2e';
    ctx.fillRect(left + 6, top + 2, 1, 5);
    ctx.fillRect(left + 2, top + 8, 2, 1);
    ctx.fillRect(left + 9, top + 8, 2, 1);

    ctx.fillStyle = 'rgba(250,107,46,.32)';
    ctx.fillRect(left + 4, top + 10, 1, 2);
    ctx.fillRect(left + 8, top + 10, 1, 2);
  }

  function drawAsteroid(asteroid) {
    const x = Math.round(asteroid.x);
    const y = Math.round(asteroid.y);
    const pattern = asteroid.radius > 6
      ? [[0,0],[1,0],[2,0],[-1,1],[0,1],[1,1],[2,1],[-1,2],[0,2],[1,2],[0,3]]
      : [[0,0],[1,0],[-1,1],[0,1],[1,1],[0,2]];

    ctx.fillStyle = asteroid.color;
    pattern.forEach(([px, py]) => {
      ctx.fillRect(x + px * 2 - 2, y + py * 2 - 2, 2, 2);
    });
    ctx.fillStyle = '#8f825f';
    ctx.fillRect(x - 2, y, 2, 2);
    ctx.fillRect(x + 2, y + 2, 2, 2);
  }

  function drawSpark(spark) {
    ctx.globalAlpha = Math.max(0, spark.life / spark.maxLife);
    ctx.fillStyle = spark.color;
    ctx.fillRect(Math.round(spark.x), Math.round(spark.y), 2, 2);
    ctx.globalAlpha = 1;
  }

  function render() {
    ctx.clearRect(0, 0, logicalWidth, logicalHeight);

    ctx.fillStyle = '#0a0a09';
    ctx.fillRect(0, 0, logicalWidth, logicalHeight);

    stars.forEach(star => {
      const alpha = 0.18 + star.brightness * 0.72;
      ctx.fillStyle = `rgba(244,239,198,${alpha})`;
      ctx.fillRect(Math.round(star.x), Math.round(star.y), 1, 1);
    });

    bullets.forEach(bullet => {
      ctx.fillStyle = '#fa6b2e';
      ctx.fillRect(Math.round(bullet.x), Math.round(bullet.y), 2, 6);
      ctx.fillStyle = 'rgba(244,239,198,.7)';
      ctx.fillRect(Math.round(bullet.x), Math.round(bullet.y) + 1, 1, 4);
    });

    asteroids.forEach(drawAsteroid);
    sparks.forEach(drawSpark);
    drawShip();

    ctx.fillStyle = 'rgba(244,239,198,.06)';
    for (let y = 0; y < logicalHeight; y += 4) {
      ctx.fillRect(0, y, logicalWidth, 1);
    }
  }

  function tick(now) {
    const dt = Math.min(0.032, (now - lastTime) / 1000);
    lastTime = now;

    updateStars(dt);
    updateGame(dt);
    render();
    frameId = window.requestAnimationFrame(tick);
  }

  function setMoveButton(button, keyName) {
    const activate = event => {
      event.preventDefault();
      keys[keyName] = true;
    };
    const release = event => {
      event.preventDefault();
      keys[keyName] = false;
    };

    button.addEventListener('pointerdown', activate);
    button.addEventListener('pointerup', release);
    button.addEventListener('pointerleave', release);
    button.addEventListener('pointercancel', release);
  }

  function setFireButtonState(active) {
    if (!fireButton) return;
    fireButton.classList.toggle('is-active', active);
  }

  function setFireButton(button) {
    if (!button) return;
    const activate = event => {
      event.preventDefault();
      if (gameState !== 'playing') return;
      shootState.active = true;
      setFireButtonState(true);
      triggerManualShot();
    };
    const release = event => {
      event.preventDefault();
      shootState.active = false;
      setFireButtonState(false);
    };

    button.addEventListener('pointerdown', activate);
    button.addEventListener('pointerup', release);
    button.addEventListener('pointerleave', release);
    button.addEventListener('pointercancel', release);
  }

  canvas.addEventListener('pointerdown', event => {
    if (gameState !== 'playing') return;
    const point = getCanvasPoint(event);
    if (!isPointerOnShip(point)) return;
    pointerControl.dragging = true;
    pointerControl.pointerId = event.pointerId;
    keys.left = false;
    keys.right = false;
    ship.x = clampShipX(point.x);
    canvas.setPointerCapture(event.pointerId);
    event.preventDefault();
  });

  canvas.addEventListener('pointermove', event => {
    if (!pointerControl.dragging || event.pointerId !== pointerControl.pointerId) return;
    const point = getCanvasPoint(event);
    ship.x = clampShipX(point.x);
    event.preventDefault();
  });

  function stopPointerDrag(event) {
    if (!pointerControl.dragging) return;
    if (event && pointerControl.pointerId !== null && event.pointerId !== pointerControl.pointerId) return;
    if (event && canvas.hasPointerCapture(event.pointerId)) {
      canvas.releasePointerCapture(event.pointerId);
    }
    pointerControl.dragging = false;
    pointerControl.pointerId = null;
  }

  canvas.addEventListener('pointerup', stopPointerDrag);
  canvas.addEventListener('pointercancel', stopPointerDrag);
  canvas.addEventListener('pointerleave', event => {
    if (pointerControl.dragging && event.pointerId === pointerControl.pointerId) return;
  });

  window.addEventListener('keydown', event => {
    if (event.key === 'ArrowLeft' || event.key.toLowerCase() === 'a') {
      keys.left = true;
      event.preventDefault();
    }
    if (event.key === 'ArrowRight' || event.key.toLowerCase() === 'd') {
      keys.right = true;
      event.preventDefault();
    }
    if (event.key === 'Enter' && gameState !== 'playing') {
      primaryAction.click();
      event.preventDefault();
    }
    if (coopMode && gameState === 'playing' && (event.key === ' ' || event.key === 'Enter' || event.key.toLowerCase() === 'z')) {
      shootState.active = true;
      setFireButtonState(true);
      triggerManualShot();
      event.preventDefault();
    }
  });

  window.addEventListener('keyup', event => {
    if (event.key === 'ArrowLeft' || event.key.toLowerCase() === 'a') keys.left = false;
    if (event.key === 'ArrowRight' || event.key.toLowerCase() === 'd') keys.right = false;
    if (coopMode && (event.key === ' ' || event.key === 'Enter' || event.key.toLowerCase() === 'z')) {
      shootState.active = false;
      setFireButtonState(false);
    }
  });

  window.addEventListener('blur', () => {
    stopPointerDrag();
    keys.left = false;
    keys.right = false;
    shootState.active = false;
    setFireButtonState(false);
  });

  setMoveButton(moveLeftBtn, 'left');
  setMoveButton(moveRightBtn, 'right');
  setFireButton(fireButton);
  if (fireButton) fireButton.classList.toggle('is-hidden', !coopMode);
  updateControlCopy();

  showMessage({
    title:'module defense',
    copy: coopMode
      ? `Mode coop actif.<br><strong>Pilotez et declenchez le tir a deux</strong> pour detruire les <strong>${totalAsteroids}</strong> asteroides.<br>Si un seul passe, la defense echoue.`
      : `Detruis les <strong>${totalAsteroids}</strong> asteroides de la vague.<br>Si un seul passe, la defense echoue.`,
    primaryLabel:'jouer',
    secondaryLabel:'retour',
    onPrimary:startGame,
    onSecondary:exitMiniGame
  });

  writeState('idle');
  updateHud();
  render();
  frameId = window.requestAnimationFrame(tick);

  window.addEventListener('beforeunload', () => {
    window.cancelAnimationFrame(frameId);
  });
})();
</script>
</body>
</html>
