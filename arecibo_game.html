<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>ARECIBO - Pont principal</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Pixelify+Sans:wght@400;700&display=swap');

:root {
  --cream:#F7FFC3;
  --orange:#FA5A1F;
  --green:#A8F02A;
  --red:#E03B31;
  --black:#020301;
  --line:rgba(247,255,195,.62);
  --line-soft:rgba(247,255,195,.28);
}

* { box-sizing:border-box; margin:0; padding:0; }

html,
body {
  width:100vw;
  height:100vh;
  overflow:hidden;
  background:#000;
  color:var(--cream);
  font-family:'Pixelify Sans', monospace;
  cursor:none;
}

body {
  background:
    linear-gradient(rgba(5,7,3,.1), rgba(5,7,3,.1)),
    url('assets/bridge-main.png') center / cover no-repeat;
}

body::before {
  content:'';
  position:fixed;
  inset:0;
  background:
    radial-gradient(ellipse at center, transparent 54%, rgba(0,0,0,.26) 78%, rgba(0,0,0,.82) 100%),
    linear-gradient(90deg, rgba(0,0,0,.62), transparent 18%, transparent 82%, rgba(0,0,0,.62));
  pointer-events:none;
  z-index:30;
}

body::after {
  content:'';
  position:fixed;
  inset:0;
  background:rgba(13,18,6,.22);
  mix-blend-mode:multiply;
  pointer-events:none;
  z-index:31;
}

.cursor {
  position:fixed;
  width:14px;
  height:14px;
  border:1.5px solid var(--cream);
  pointer-events:none;
  z-index:9999;
  transform:translate(-50%,-50%);
}
.cursor::after {
  content:'';
  position:absolute;
  top:50%;
  left:50%;
  width:3px;
  height:3px;
  background:var(--orange);
  transform:translate(-50%,-50%);
}

.bridge {
  position:relative;
  width:100vw;
  height:100vh;
  overflow:hidden;
  z-index:2;
}

.bridge-glass {
  position:absolute;
  inset:clamp(24px, 4vh, 56px) clamp(44px, 5vw, 94px);
  border-radius:clamp(32px, 5vw, 92px);
  border:1px solid rgba(247,255,195,.06);
  box-shadow:
    inset 0 0 46px rgba(247,255,195,.035),
    inset 0 0 90px rgba(0,0,0,.78),
    0 0 38px rgba(0,0,0,.82);
  pointer-events:none;
  z-index:4;
}

.neon-glow {
  position:absolute;
  inset:0;
  pointer-events:none;
  z-index:5;
  opacity:.55;
  mix-blend-mode:screen;
  filter:blur(12px) saturate(1.18);
  background:
    radial-gradient(ellipse 24% 8% at 50% 10%, rgba(247,255,195,.58), transparent 62%),
    radial-gradient(ellipse 19% 6% at 49% 15.6%, rgba(247,255,195,.34), transparent 65%),
    radial-gradient(ellipse 16% 5% at 50% 20.6%, rgba(247,255,195,.25), transparent 67%),
    radial-gradient(ellipse 4% 12% at 8% 47%, rgba(247,255,195,.22), transparent 72%),
    radial-gradient(ellipse 8% 12% at 84% 47%, rgba(247,255,195,.2), transparent 72%),
    radial-gradient(ellipse 18% 10% at 73% 75%, rgba(247,255,195,.16), transparent 74%),
    radial-gradient(ellipse 20% 12% at 28% 76%, rgba(247,255,195,.13), transparent 76%);
  animation:neonBreath 4.8s ease-in-out infinite;
}

@keyframes neonBreath {
  0%, 100% {
    opacity:.45;
    filter:blur(11px) saturate(1.08);
  }
  42% {
    opacity:.68;
    filter:blur(15px) saturate(1.28);
  }
  68% {
    opacity:.52;
    filter:blur(13px) saturate(1.16);
  }
}

.ship-window {
  position:absolute;
  left:13.2vw;
  top:29vh;
  width:min(42vw, 520px);
  min-width:440px;
  border:1px solid var(--line);
  background:rgba(0,0,0,.08);
  color:var(--cream);
  text-shadow:0 0 8px rgba(247,255,195,.16);
  z-index:10;
  transform-origin:46% 52%;
  transition:
    transform .22s ease,
    border-color .22s ease,
    box-shadow .22s ease,
    background .22s ease;
}
.ship-window:hover {
  transform:translate3d(3px, -2px, 0) rotate(.12deg);
  border-color:rgba(247,255,195,.82);
  background:rgba(0,0,0,.12);
  box-shadow:
    0 0 16px rgba(247,255,195,.09),
    inset 0 0 24px rgba(247,255,195,.025);
}

.ship-title {
  height:55px;
  display:flex;
  align-items:center;
  padding:0 28px;
  border-bottom:1px solid var(--line);
  font-size:clamp(22px, 1.8vw, 34px);
  line-height:1;
  letter-spacing:.06em;
  text-transform:uppercase;
}

.ship-section {
  padding:24px 28px 23px;
  border-bottom:1px solid var(--line);
}
.ship-section:last-child { border-bottom:0; }

.stat-line {
  display:grid;
  grid-template-columns:128px 1fr;
  gap:12px;
  align-items:center;
  min-height:34px;
  margin-bottom:9px;
}
.stat-line:last-child { margin-bottom:0; }

.tag {
  display:inline-flex;
  align-items:center;
  width:max-content;
  min-height:27px;
  border:1px solid var(--line);
  padding:3px 8px 4px;
  background:rgba(0,0,0,.13);
  font-size:16px;
  line-height:1;
  letter-spacing:.05em;
  text-transform:uppercase;
}

.critical {
  border:1px solid rgba(224,59,49,.86);
  color:var(--red);
  text-align:center;
  font-size:16px;
  letter-spacing:.07em;
  text-transform:uppercase;
  padding:3px 8px 4px;
  background:rgba(224,59,49,.035);
  transition:
    color .18s ease,
    border-color .18s ease,
    background .18s ease,
    box-shadow .18s ease,
    text-shadow .18s ease;
}
.critical:hover,
.stat-line:hover .critical {
  color:#ff685c;
  border-color:rgba(255,104,92,.98);
  background:rgba(224,59,49,.095);
  box-shadow:
    0 0 14px rgba(224,59,49,.23),
    inset 0 0 10px rgba(224,59,49,.1);
  text-shadow:0 0 10px rgba(255,104,92,.5);
}

.fuel {
  display:flex;
  align-items:center;
  gap:7px;
}
.fuel-track {
  flex:1;
  height:21px;
  border:1px solid rgba(168,240,42,.82);
  border-radius:999px;
  overflow:hidden;
  background:rgba(0,0,0,.2);
}
.fuel-fill {
  width:78%;
  height:100%;
  background:var(--green);
  border-radius:999px;
}
.fuel-value {
  min-width:51px;
  min-height:22px;
  border:1px solid rgba(168,240,42,.82);
  border-radius:999px;
  color:var(--green);
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:16px;
}

.oxygen {
  display:flex;
  gap:11px;
}
.oxygen-pack {
  display:flex;
  align-items:center;
  gap:11px;
  min-width:84px;
  height:27px;
  border:1px solid var(--line-soft);
  border-radius:999px;
  padding:0 10px;
  background:rgba(0,0,0,.16);
}
.oxygen-dot {
  width:15px;
  height:15px;
  border-radius:50%;
  background:var(--cream);
  box-shadow:0 0 10px rgba(247,255,195,.22);
}

.antenna-grid {
  display:grid;
  grid-template-columns:98px 1fr;
  gap:12px;
  align-items:center;
  margin-bottom:11px;
}
.signal {
  color:var(--cream);
  font-size:16px;
  letter-spacing:.055em;
  text-transform:uppercase;
}
.bars {
  height:31px;
  display:flex;
  align-items:flex-end;
  gap:8px;
  margin-top:12px;
}
.bar {
  width:8px;
  background:var(--cream);
  opacity:.9;
  transform-origin:bottom center;
  animation:signalPulse 1.55s steps(3, end) infinite;
}
.bar:nth-child(1) { height:8px; }
.bar:nth-child(2) { height:11px; animation-delay:.16s; }
.bar:nth-child(3) { height:15px; animation-delay:.32s; }
.bar:nth-child(4) { height:8px; animation-delay:.48s; }
.bar:nth-child(5) { height:22px; animation-delay:.64s; }
@keyframes signalPulse {
  0%, 100% {
    transform:scaleY(.82);
    opacity:.7;
    box-shadow:none;
  }
  45% {
    transform:scaleY(1.16);
    opacity:1;
    box-shadow:0 0 8px rgba(247,255,195,.28);
  }
  70% {
    transform:scaleY(.96);
    opacity:.88;
  }
}
.bits {
  display:flex;
  align-items:center;
  gap:12px;
  font-size:17px;
  letter-spacing:.055em;
}
.bits-tag {
  border:1px solid var(--line);
  padding:3px 8px 4px;
  background:rgba(0,0,0,.15);
}

.distance-label {
  font-size:16px;
  letter-spacing:.07em;
  text-transform:uppercase;
  margin-bottom:7px;
}
.distance-value {
  font-size:34px;
  line-height:1;
  font-weight:700;
  letter-spacing:.025em;
  text-shadow:0 0 10px rgba(247,255,195,.14);
  transition:text-shadow .18s ease, color .18s ease;
}
.ship-section:hover .distance-value {
  color:#fbffd7;
  text-shadow:0 0 13px rgba(247,255,195,.3);
}

.extraction-console {
  position:absolute;
  left:50%;
  top:50%;
  width:232px;
  transform:translate(-50%, -50%);
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  gap:13px;
  padding:0;
  background:transparent;
  border:0;
  border-radius:0;
  box-shadow:none;
  z-index:11;
}
.console-copy {
  width:100%;
  color:rgba(247,255,195,.94);
  text-align:center;
  font-size:13px;
  line-height:1.32;
  letter-spacing:.03em;
}
.console-copy .dim {
  color:rgba(247,255,195,.72);
}

.launch-btn {
  width:205px;
  height:34px;
  display:grid;
  grid-template-columns:30px 1fr;
  gap:5px;
  border:0;
  background:transparent;
  color:var(--orange);
  font-family:'Pixelify Sans', monospace;
  font-size:14px;
  font-weight:700;
  letter-spacing:.05em;
  cursor:none;
  transition:filter .16s, transform .1s;
}
.launch-btn:hover {
  transform:translateY(-1px);
  filter:drop-shadow(0 0 13px rgba(250,90,31,.34));
}
.launch-icon,
.launch-label {
  min-width:0;
  height:34px;
  display:flex;
  align-items:center;
  justify-content:center;
  border:1px solid var(--orange);
  line-height:1;
}
.launch-icon {
  color:var(--orange);
  background:rgba(0,0,0,.3);
  font-size:18px;
}
.launch-label {
  color:#050505;
  background:var(--orange);
  padding:0 9px;
  white-space:nowrap;
}
.launch-btn.ready {
  color:var(--green);
  filter:drop-shadow(0 0 10px rgba(168,240,42,.22));
}
.launch-btn.ready .launch-icon,
.launch-btn.ready .launch-label {
  border-color:var(--green);
}
.launch-btn.ready .launch-icon {
  color:var(--green);
}
.launch-btn.ready .launch-label {
  background:var(--green);
}

.crew-ready {
  display:grid;
  grid-template-columns:repeat(6, 1fr);
  gap:5px;
  width:205px;
}
.crew-slot {
  min-width:0;
  height:32px;
  border:1px solid var(--cream);
  background:rgba(0,0,0,.18);
  color:var(--cream);
  font-family:'Pixelify Sans', monospace;
  font-size:16px;
  cursor:none;
  opacity:.82;
  transition:
    color .14s ease,
    border-color .14s ease,
    background .14s ease,
    box-shadow .14s ease,
    transform .14s ease;
}
.crew-slot:hover {
  color:var(--orange);
  border-color:var(--orange);
  background:rgba(250,90,31,.045);
  box-shadow:0 0 10px rgba(250,90,31,.16);
  transform:translateY(-1px);
}
.crew-slot.ready {
  color:var(--orange);
  border-color:var(--orange);
  background:rgba(250,90,31,.06);
}
.crew-slot.disabled {
  opacity:.16;
  pointer-events:none;
}

.bridge-meta {
  position:absolute;
  left:13.2vw;
  bottom:5.4vh;
  color:rgba(247,255,195,.24);
  font-size:10px;
  letter-spacing:.12em;
  z-index:10;
}

.back-btn {
  position:absolute;
  left:13.2vw;
  top:8.5vh;
  border:1px solid rgba(247,255,195,.22);
  background:rgba(0,0,0,.16);
  color:rgba(247,255,195,.55);
  min-height:36px;
  padding:0 14px;
  font-family:'Pixelify Sans', monospace;
  font-size:11px;
  letter-spacing:.1em;
  cursor:none;
  z-index:12;
}
.back-btn:hover {
  color:var(--cream);
  border-color:rgba(247,255,195,.5);
}

.page-transition {
  position:fixed;
  inset:0;
  background:#000;
  z-index:1000;
  opacity:1;
  pointer-events:all;
  transition:opacity .7s ease;
}
.page-transition.out {
  opacity:0;
  pointer-events:none;
}

@media (max-width: 980px) {
  .ship-window {
    left:5vw;
    width:90vw;
    min-width:0;
    top:21vh;
  }
  .extraction-console {
    top:auto;
    bottom:7vh;
    width:min(86vw, 330px);
  }
  .back-btn { left:5vw; top:5vh; }
  .bridge-meta { display:none; }
}
</style>
<link rel="stylesheet" href="assets/terminal-filter.css?v=global-terminal-filter-amber">
</head>
<body>
<div class="cursor" id="cursor"></div>
<div class="page-transition" id="transition"></div>

<main class="bridge" aria-label="Pont principal du MOTOMOTO">
  <div class="bridge-glass" aria-hidden="true"></div>
  <div class="neon-glow" aria-hidden="true"></div>

  <button class="back-btn" type="button" onclick="goMenu()">&#60; MENU</button>

  <section class="ship-window" aria-label="Informations du vaisseau">
    <header class="ship-title">&#62;EQUIPEMENT PERSONNELLE\</header>

    <div class="ship-section">
      <div class="stat-line">
        <span class="tag">COQUE</span>
        <span class="critical">ENDOMMAGE - ETAT CRITIQUE</span>
      </div>
      <div class="stat-line">
        <span class="tag">CARBURANT</span>
        <div class="fuel">
          <div class="fuel-track"><div class="fuel-fill"></div></div>
          <span class="fuel-value">78%</span>
        </div>
      </div>
      <div class="stat-line">
        <span class="tag">OXYGENE</span>
        <div class="oxygen" aria-label="Reserve oxygene">
          <span class="oxygen-pack"><span class="oxygen-dot"></span><span class="oxygen-dot"></span><span class="oxygen-dot"></span></span>
          <span class="oxygen-pack"><span class="oxygen-dot"></span><span class="oxygen-dot"></span><span class="oxygen-dot"></span></span>
          <span class="oxygen-pack"><span class="oxygen-dot"></span><span class="oxygen-dot"></span><span class="oxygen-dot"></span></span>
        </div>
      </div>
    </div>

    <div class="ship-section">
      <div class="antenna-grid">
        <span class="tag">ANTENNE</span>
        <span class="signal">ETAT DU SIGNAL - BON</span>
      </div>
      <div class="antenna-grid">
        <div class="bars" aria-hidden="true">
          <span class="bar"></span><span class="bar"></span><span class="bar"></span><span class="bar"></span><span class="bar"></span>
        </div>
        <div class="bits">
          <span class="bits-tag">BITS RECUPERES</span>
          <span>0/1679</span>
        </div>
      </div>
    </div>

    <div class="ship-section">
      <div class="distance-label">DISTANCE - TROU NOIR</div>
      <div class="distance-value" id="distance-value">473.65M KM</div>
    </div>
  </section>

  <section class="extraction-console" aria-label="Lancement expedition">
    <p class="console-copy">Zone d'expedition disponible<br><span class="dim">debris detectes a proximite...</span></p>
    <button class="launch-btn" id="launch-btn" type="button">
      <span class="launch-icon">+</span>
      <span class="launch-label">LANCER L'EXPEDITION</span>
    </button>
    <div class="crew-ready" id="crew-ready" aria-label="Etat de preparation equipage"></div>
  </section>

  <div class="bridge-meta">MOTOMOTO // PONT PRINCIPAL // SALVAGE PROTOCOL</div>
</main>

<script>
const cursor = document.getElementById('cursor');
document.addEventListener('mousemove', event => {
  cursor.style.left = event.clientX + 'px';
  cursor.style.top = event.clientY + 'px';
});

window.addEventListener('DOMContentLoaded', () => {
  setTimeout(() => document.getElementById('transition').classList.add('out'), 80);
});

const params = new URLSearchParams(window.location.search);
const storedPlayers = Number(localStorage.getItem('areciboPlayerCount'));
const requestedPlayers = Number(params.get('players'));
const playerCount = Math.max(1, Math.min(6, requestedPlayers || storedPlayers || 6));
const readyState = Array.from({ length: 6 }, (_, index) => index >= playerCount);
const crewEl = document.getElementById('crew-ready');
const launchBtn = document.getElementById('launch-btn');
const launchLabel = launchBtn.querySelector('.launch-label');
const launchIcon = launchBtn.querySelector('.launch-icon');
const distanceValue = document.getElementById('distance-value');
const initialDistanceMillionKm = 473.65;
const millionKmPerSecond = 0.00035;
const distanceStart = performance.now();

function updateDistance() {
  const elapsedSeconds = (performance.now() - distanceStart) / 1000;
  const currentDistance = Math.max(0, initialDistanceMillionKm - elapsedSeconds * millionKmPerSecond);
  distanceValue.textContent = `${currentDistance.toFixed(2)}M KM`;
  requestAnimationFrame(updateDistance);
}

function renderCrew() {
  crewEl.innerHTML = '';
  readyState.forEach((ready, index) => {
    const slot = document.createElement('button');
    slot.type = 'button';
    slot.className = 'crew-slot';
    slot.textContent = `P${index + 1}`;

    if (index >= playerCount) {
      slot.classList.add('disabled');
      slot.setAttribute('aria-disabled', 'true');
    } else {
      slot.classList.toggle('ready', ready);
      slot.setAttribute('aria-pressed', String(ready));
      slot.addEventListener('click', () => {
        readyState[index] = !readyState[index];
        updateReadyState();
      });
    }

    crewEl.appendChild(slot);
  });
}

function updateReadyState() {
  const activeReady = readyState.slice(0, playerCount);
  const allReady = activeReady.every(Boolean);
  launchBtn.classList.toggle('ready', allReady);
  launchIcon.textContent = allReady ? 'OK' : '+';
  launchLabel.textContent = allReady ? 'EQUIPE PRETE' : 'LANCER L\'EXPEDITION';
  renderCrew();
}

launchBtn.addEventListener('click', () => {
  const allReady = readyState.slice(0, playerCount).every(Boolean);
  if (!allReady) {
    readyState[0] = true;
    updateReadyState();
    return;
  }

  launchIcon.textContent = 'OK';
  launchLabel.textContent = 'OUVERTURE DU SAS...';
  document.getElementById('transition').classList.remove('out');
});

function goMenu() {
  const transition = document.getElementById('transition');
  transition.classList.remove('out');
  setTimeout(() => window.location.href = 'arecibo_menu.html?v=bridge-main', 520);
}

updateReadyState();
updateDistance();
</script>
</body>
</html>
